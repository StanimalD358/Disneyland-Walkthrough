<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Audio Player</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent-blue: #2979ff;
            --accent-gold: #ffc107;
            --player-bg: #181818;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MAIN APP LAYOUT --- */
        .app-container { display: flex; flex: 1; overflow: hidden; padding-bottom: 120px; }
        .main-content { flex: 3; padding: 30px; overflow-y: hidden; display: flex; flex-direction: column; align-items: center; }
        .sidebar { flex: 1; min-width: 320px; background-color: #000000; padding: 20px; overflow-y: auto; border-left: 1px solid #282828; }

        h1 { margin-top: 0; font-size: 28px; width: 100%; text-align: left; flex-shrink: 0; }
        p.subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 20px; width: 100%; text-align: left; flex-shrink: 0; }
        h3.section-title { font-size: 18px; color: var(--text-main); border-bottom: 1px solid var(--bg-hover); padding-bottom: 10px; margin-top: 20px; width: 100%; }

        /* --- DYNAMIC PAN & ZOOM MAP STYLES --- */
        .map-outer-container { position: relative; width: 100%; flex: 1; display: flex; flex-direction: column; margin-top: 10px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); border: 2px solid #333; overflow: hidden; background-color: #000; }
        .map-wrapper { position: relative; width: 100%; flex: 1; height: 100%; overflow: auto; cursor: grab; -ms-overflow-style: none; scrollbar-width: none; }
        .map-wrapper::-webkit-scrollbar { display: none; }
        .map-wrapper:active { cursor: grabbing; }
        #map-zoom-container { position: relative; width: 100%; transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        #park-map-image { width: 100%; display: block; height: auto; user-select: none; -webkit-user-drag: none; }

        .zoom-controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .zoom-btn { background-color: rgba(30, 30, 30, 0.8); color: white; border: 1px solid #555; border-radius: 50%; width: 44px; height: 44px; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); transition: background-color 0.2s, transform 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .zoom-btn:hover { background-color: var(--accent-blue); }
        .zoom-btn:active { transform: scale(0.9); }
        /* --- MASSIVE PICTURE SCRUBBER --- */
        .progress-container {
            display: none; 
            align-items: center;
            width: 100%;
        }

        #time-current, #time-total {
            font-size: 14px; 
            color: var(--text-muted);
            min-width: 50px;
        }
        #time-current { text-align: right; }
        #time-total { text-align: left; }

        #progress-slider {
            flex: 1;
            margin: 0 20px; 
            cursor: pointer;
            -webkit-appearance: none; 
            background: transparent; 
            height: 48px; 
            --thumb-icon: url('data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'16\\' height=\\'16\\'><circle cx=\\'8\\' cy=\\'8\\' r=\\'8\\' fill=\\'%23ffc107\\'/></svg>'); 
        }

        #progress-slider::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #444; border-radius: 4px; }
        #progress-slider::-moz-range-track { width: 100%; height: 8px; background: #444; border-radius: 4px; }

        #progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none; height: 48px; width: 48px; border-radius: 0; border: none; outline: none;
            background-image: var(--thumb-icon); background-size: contain; background-repeat: no-repeat; background-position: center; background-color: transparent; 
            margin-top: -20px; 
            filter: drop-shadow(0px 3px 8px rgba(0,0,0,0.8)); transition: background-image 0.3s;
        }
        #progress-slider::-moz-range-thumb {
            height: 48px; width: 48px; border-radius: 0; border: none; outline: none;
            background-image: var(--thumb-icon); background-size: contain; background-repeat: no-repeat; background-position: center; background-color: transparent;
            filter: drop-shadow(0px 3px 8px rgba(0,0,0,0.8)); transition: background-image 0.3s;
        }

        /* --- PIXIE DUST VOLUME SLIDER --- */
        .player-right {
            width: 30%;
            min-width: 320px; 
            display: flex;
            justify-content: center; 
            align-items: center;
        }

        .volume-container {
            display: none; 
            align-items: center;
            gap: 12px;
            width: 160px; 
        }

        #vol-icon { font-size: 20px; color: var(--text-muted); }

        #volume-slider {
            flex: 1; -webkit-appearance: none; background: transparent; height: 24px; cursor: pointer;
        }
        #volume-slider::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #444; border-radius: 2px; }
        #volume-slider::-moz-range-track { width: 100%; height: 4px; background: #444; border-radius: 2px; }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background-color: transparent;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffc107"><path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z"/></svg>');
            background-size: contain; background-repeat: no-repeat; background-position: center; margin-top: -10px; 
            filter: drop-shadow(0 0 4px #ffc107) drop-shadow(0 0 10px #ffeba1); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
        }
        #volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3) rotate(15deg); filter: drop-shadow(0 0 8px #ffc107) drop-shadow(0 0 15px #ffffff); }
        #volume-slider::-moz-range-thumb {
            height: 24px; width: 24px; border-radius: 50%; border: none; background-color: transparent;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffc107"><path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z"/></svg>');
            background-size: contain; background-repeat: no-repeat; background-position: center;
            filter: drop-shadow(0 0 4px #ffc107) drop-shadow(0 0 10px #ffeba1); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s;
        }
        #volume-slider::-moz-range-thumb:hover { transform: scale(1.3) rotate(15deg); filter: drop-shadow(0 0 8px #ffc107) drop-shadow(0 0 15px #ffffff); }

        .hidden-player { display: none; }

        /* --- PICTURE PINS & MAGIC PULSE --- */
        .map-pin { position: absolute; transform: translate(-50%, -50%); cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,0.8); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s; z-index: 10; }
        .ride-pin { width: 36px; height: 36px; background-color: var(--bg-card); border: 2px solid white; border-radius: 50%; animation: magicPulse 2.5s infinite; }
        .map-pin:hover { transform: translate(-50%, -50%) scale(1.3); border-color: var(--accent-gold); z-index: 20; animation: none; }
        @keyframes magicPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }
        
        .map-pin::after { content: attr(data-name); position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border: 1px solid #444; }
        .map-pin:hover::after { opacity: 1; }

        /* --- ✨ NEW: CUSTOM AUDIO POPUP MENU ✨ --- */
        .custom-popup {
            position: absolute;
            background: var(--bg-card);
            border: 2px solid var(--accent-gold);
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            z-index: 1000;
            min-width: 180px;
            transform: translate(-50%, calc(-100% - 25px)); 
        }
        .custom-popup::after {
            content: ''; position: absolute; top: 100%; left: 50%; margin-left: -8px;
            border-width: 8px; border-style: solid;
            border-color: var(--accent-gold) transparent transparent transparent;
        }
        .custom-popup h4 { margin: 0 0 10px 0; font-size: 14px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 8px; color: var(--text-main); }
        .custom-popup button {
            display: block; width: 100%; margin: 6px 0 0 0; padding: 10px;
            background: var(--bg-hover); color: white; border: none; border-radius: 4px; cursor: pointer;
            font-size: 13px; text-align: left; transition: background 0.2s, color 0.2s, transform 0.1s;
        }
        .custom-popup button:hover { background: var(--accent-gold); color: black; transform: scale(1.02); }
        .close-popup { position: absolute; top: 5px; right: 8px; cursor: pointer; font-size: 14px; color: var(--text-muted); }
        .close-popup:hover { color: #ff4d4d; }

        /* --- BUTTONS & QUEUE LIST --- */
        .start-btn { background-color: var(--accent-gold); color: #000; width: 100%; border: none; border-radius: 30px; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
        .start-btn:hover { transform: scale(1.02); background-color: #e5ad06; }
        .clear-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); border-radius: 20px; padding: 6px 15px; font-size: 12px; cursor: pointer; margin-top: 15px; transition: color 0.2s, border-color 0.2s; }
        .clear-btn:hover { color: #ff4d4d; border-color: #ff4d4d; }
        
        #itinerary-list { padding: 0; margin: 0; list-style: none; }
        #itinerary-list li { padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 12px; transition: background 0.2s; cursor: default; }
        #itinerary-list li:hover { background-color: var(--bg-hover); }
        .queue-img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; box-shadow: 0 2px 6px rgba(0,0,0,0.6); flex-shrink: 0; }
        .queue-info { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .queue-title { color: var(--text-main); font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .queue-subtitle { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .remove-item-btn { background: transparent; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 5px 10px; opacity: 0.3; transition: opacity 0.2s, color 0.2s, transform 0.2s; }
        #itinerary-list li:hover .remove-item-btn { opacity: 1; }
        .remove-item-btn:hover { color: #ff4d4d; transform: scale(1.2); }
        .active-item { background-color: rgba(255, 193, 7, 0.1) !important; border-left: 3px solid var(--accent-gold); padding-left: 7px !important; }
        .active-item .queue-title { color: var(--accent-gold); }

        /* --- BOTTOM "NOW PLAYING" BAR & CONTROLS --- */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 120px; background-color: var(--player-bg); border-top: 1px solid #282828; display: flex; align-items: center; padding: 0 30px; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); z-index: 100; }
        .now-playing-info { display: flex; align-items: center; width: 30%; min-width: 320px; }
        #np-image { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; margin-right: 20px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .np-text { display: flex; flex-direction: column; overflow: hidden; }
        #np-title { font-size: 18px; font-weight: bold; color: var(--text-main); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #np-subtitle { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; max-width: 50%; margin: 0 auto; }
        .player-controls { margin-bottom: 12px; display: flex; align-items: center; gap: 25px; }
        .control-btn { background: transparent; color: var(--text-main); border: none; cursor: pointer; display: none; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #play-pause-btn { width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(135deg, #003399, #005ce6); border: 3px solid #ffcc00; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 204, 0, 0.3), inset 0 2px 5px rgba(255,255,255,0.4); }
        #play-pause-btn:hover { transform: scale(1.1); background: linear-gradient(135deg, #0040cc, #0073e6); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 204, 0, 0.6), inset 0 2px 5px rgba(255,255,255,0.5); border-color: #ffe680; }
        #skip-btn { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(135deg, #2a2a2a, #444); border: 2px solid #a7a7a7; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5); }
        #skip-btn:hover { transform: scale(1.1); border-color: #ffffff; background: linear-gradient(135deg, #333, #555); }
        .control-btn svg { fill: currentColor; width: 32px; height: 32px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); }
        #skip-btn svg { width: 24px; height: 24px; }
        .icon-play, .icon-pause { display: none; }
        #play-pause-btn.is-paused .icon-play { display: block; margin-left: 5px; }
        #play-pause-btn.is-playing .icon-pause { display: block; }
        .progress-container { display: none; align-items: center; width: 100%; }
        #time-current, #time-total { font-size: 14px; color: var(--text-muted); min-width: 50px; }
        #time-current { text-align: right; }
        #time-total { text-align: left; }
        #progress-slider { flex: 1; margin: 0 20px; cursor: pointer; -webkit-appearance: none; background: transparent; height: 48px; --thumb-icon: url('data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'16\\' height=\\'16\\'><circle cx=\\'8\\' cy=\\'8\\' r=\\'8\\' fill=\\'%23ffc107\\'/></svg>'); }
        #progress-slider::-webkit-slider-runnable-track { width: 100%; height: 8px; background: #444; border-radius: 4px; }
        #progress-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 48px; width: 48px; border-radius: 0; border: none; outline: none; background-image: var(--thumb-icon); background-size: contain; background-repeat: no-repeat; background-position: center; background-color: transparent; margin-top: -20px; filter: drop-shadow(0px 3px 8px rgba(0,0,0,0.8)); transition: background-image 0.3s; }
        .player-right { width: 30%; min-width: 320px; display: flex; justify-content: center; align-items: center; }
        .volume-container { display: none; align-items: center; gap: 12px; width: 160px; }
        #vol-icon { font-size: 20px; color: var(--text-muted); }
        #volume-slider { flex: 1; -webkit-appearance: none; background: transparent; height: 24px; cursor: pointer; }
        #volume-slider::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #444; border-radius: 2px; }
        #volume-slider::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background-color: transparent; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffc107"><path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z"/></svg>'); background-size: contain; background-repeat: no-repeat; background-position: center; margin-top: -10px; filter: drop-shadow(0 0 4px #ffc107) drop-shadow(0 0 10px #ffeba1); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s; }
        #volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3) rotate(15deg); filter: drop-shadow(0 0 8px #ffc107) drop-shadow(0 0 15px #ffffff); }
        .hidden-player { display: none; }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 850px) {
            body { overflow-y: auto; }
            .app-container { flex-direction: column; overflow: visible; padding-bottom: 140px; }
            .main-content { padding: 15px; overflow: visible; flex: none; }
            .sidebar { min-width: 100%; border-left: none; border-top: 1px solid #282828; padding: 15px; overflow: visible; flex: none; }
            .map-outer-container { height: 60vh; min-height: 400px; flex: none; }
            .player-bar { display: grid; grid-template-columns: 1fr auto; grid-template-rows: auto auto; grid-template-areas: "info controls" "progress progress"; height: auto; padding: 15px; gap: 10px 15px; }
            .now-playing-info { grid-area: info; width: 100%; min-width: 0; }
            #np-image { width: 50px; height: 50px; margin-right: 12px; }
            #np-title { font-size: 15px; }
            #np-subtitle { font-size: 12px; }
            .player-center { display: contents; }
            .player-controls { grid-area: controls; margin-bottom: 0; gap: 15px; }
            .progress-container { grid-area: progress; margin-top: 5px; }
            .player-right { display: none; } 
            #play-pause-btn { width: 50px; height: 50px; border-width: 2px; }
            #skip-btn { width: 40px; height: 40px; }
            .control-btn svg { width: 24px; height: 24px; }
            #skip-btn svg { width: 18px; height: 18px; }
            #progress-slider { height: 36px; margin: 0 10px; }
            #progress-slider::-webkit-slider-thumb { height: 36px; width: 36px; margin-top: -14px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="main-content">
            <h1>Disneyland Audio Map</h1>
            <p class="subtitle">Click pins on the map to choose audio and build your queue.</p>

            <div class="map-outer-container">
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomMap(1)" title="Zoom In">+</button>
                    <button class="zoom-btn" onclick="zoomMap(-1)" title="Zoom Out">−</button>
                </div>
                <div class="map-wrapper" id="map-wrapper">
                    <div id="map-zoom-container">
                        <img id="park-map-image" src="images/ParkMap.png" alt="Park Map" draggable="false">
                        <div id="map-pins-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <h3 class="section-title" style="margin-top: 0;">Up Next</h3>
            <ul id="itinerary-list">
                <li style="color: #555; padding: 10px 0;">Your queue is empty.</li>
            </ul>
            <button class="clear-btn" onclick="clearItinerary()">Clear Entire Queue</button>
            <button class="start-btn" onclick="startWalkthrough()">▶ Play Walkthrough</button>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing-info">
            <img id="np-image" src="" alt="Album Art">
            <div class="np-text">
                <div id="np-title">Ready to Play</div>
                <div id="np-subtitle">Build your queue above</div>
            </div>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <button id="play-pause-btn" class="control-btn is-playing" onclick="togglePlayPause()" title="Pause">
                    <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="skip-btn" class="control-btn" onclick="skipStep()" title="Skip to Next">
                    <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                </button>
            </div>
            <div class="progress-container" id="progress-container">
                <span id="time-current">0:00</span>
                <input type="range" id="progress-slider" min="0" value="0" step="1">
                <span id="time-total">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <div class="volume-container" id="volume-container">
                <span id="vol-icon">🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
            </div>
        </div>
    </div>

    <audio id="player-1" class="hidden-player"></audio>
    <audio id="player-2" class="hidden-player"></audio>

    <script>
        const parkData = {
            mainStreet: {
                name: "Main Street, U.S.A.", image: "images/Main Street.png", icon: "images/Trolly.png", 
                ambientAudio: ["Audio/MS1.mp3", "Audio/MS2.mp3", "Audio/MS3.mp3", "Audio/MS4.mp3"],
                rides: {
                    train: { name: "Disneyland Railroad", image: "images/Disneyland Railroad.png", mapX: 56.4, mapY: 89.9, audioTracks: [{title: "On-Ride POV", file: "Audio/Train.mp3"}, {title: "Grand Circle Tour", file: "Audio/Train_Tour.mp3"}] },
                    cinema: { name: "Main Street Shops", image: "images/Main Street Emporium.png", mapX: 54.9, mapY: 77.3, audioTracks: [{title: "Store Music", file: "Audio/Shops.mp3"}] }
                }
            },
            adventureland: {
                name: "Adventureland", image: "images/Adventureland.png", icon: "images/IndyCar.png", 
                ambientAudio: ["Audio/Adventure1.mp3", "Audio/Adventure2.mp3", "Audio/Adventure3.mp3", "Audio/Adventure4.mp3"],
                rides: {
                    indy: { name: "Indiana Jones Adventure", image: "images/Indiana Jones Adventure.png", mapX: 40.7, mapY: 69.7, audioTracks: [{title: "Ride POV", file: "Audio/IndyRide.mp3"}, {title: "Queue Audio", file: "Audio/IndyQueue.mp3"}] },
                    jungle: { name: "Jungle Cruise", image: "images/Jungle Cruise.png", mapX: 44.7, mapY: 68.5, audioTracks: [{title: "Skipper Audio", file: "Audio/Jungle.mp3"}] },
                    Tiki: { name: "The Tiki Room", image: "images/Enchanted Tiki Room.png", mapX: 48.9, mapY: 64.8, audioTracks: [{title: "Full Show", file: "Audio/TikiRoom.mp3"}] },

                rides: {

                    Casey: { name: "Casey Jr Circus Train", image: "images/Casey.png", mapX: 53.5, mapY: 34.5, audioTracks: [{title: "Ride POV", file: "Audio/Casey.mp3"}] }

            },
            Toontown: {
                name: "Toontown", image: "images/Toontown Area Music.png", icon: "images/ToonTownnIcon.png", 
                ambientAudio: ["Audio/Toon1.mp3", "Audio/Toon2.mp3"],
                rides: {
                    Railroad: { name: "Runaway Railway", image: "images/Runaway.jpg", mapX: 63.8, mapY: 9.4, audioTracks: [{title: "Ride POV", file: "Audio/Runaway.mp3"}, {title: "Queue Audio", file: "Audio/RunawayQueue.mp3"}] },
                    Rodger: { name: "Cartoon Spin", image: "images/Toontown Area Music.png", mapX: 67.8, mapY: 12.9, audioTracks: [{title: "Ride POV", file: "Audio/Rabbit.mp3"}] }
                }
            },
            tomorrowland: {
                name: "Tomorrowland", image: "images/Tomorrowland.png", icon: "images/Space Icon.png", 
                ambientAudio: ["Audio/TL1.mp3","Audio/TL2.mp3"],
                rides: {
                    spaceMountain: { name: "Space Mountain", image: "images/Space Mountain.png", mapX: 76.9, mapY: 69.5, audioTracks: [{title: "Michael Giacchino Score", file: "audio/space_mountain.mp3"}, {title: "Dick Dale Score", file: "audio/space_mountain_old.mp3"}] },
                    starTours: { name: "Star Tours", image: "images/Star Tours.png", mapX: 69.2, mapY: 60.7, audioTracks: [{title: "Ride POV", file: "audio/star_tours.mp3"}, {title: "Queue Droids", file: "audio/star_tours_queue.mp3"}] },
                    Buzz: { name: "Astro Blasters", image: "images/Buzz.png", mapX: 73.3, mapY: 56.3, audioTracks: [{title: "Ride POV", file: "Audio/Buzz.mp3"}] },
                    Carousel: { name: "Carousel of Progress", image: "images/Carousel of Progress.png", mapX: 86.9, mapY: 58.3, audioTracks: [{title: "Full Show", file: "audio/carousel.mp3"}] },
               }
            }
        };

        const mapPinsContainer = document.getElementById('map-pins-container');
        const itineraryList = document.getElementById('itinerary-list');
        const npTitle = document.getElementById('np-title');
        const npSubtitle = document.getElementById('np-subtitle');
        const npImage = document.getElementById('np-image');
        const skipBtn = document.getElementById('skip-btn');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressSlider = document.getElementById('progress-slider');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const volumeContainer = document.getElementById('volume-container');
        const volumeSlider = document.getElementById('volume-slider');
        
        let masterVolume = 1.0; 
        let itinerary = []; 
        let playbackQueue = []; 
        let nextItemId = 0; 
        let isWalkthroughActive = false;
        let activePopup = null; 

        const player1 = document.getElementById('player-1');
        const player2 = document.getElementById('player-2');
        let activePlayer = 1; 
        let fadeInterval;

        // --- MAP RENDERING ---
        function renderMapPins() {
            mapPinsContainer.innerHTML = '';
            
            for (const landKey in parkData) {
                const land = parkData[landKey];
                for (const rideKey in land.rides) {
                    const ride = land.rides[rideKey];
                    if (ride.mapX && ride.mapY) {
                        const ridePin = document.createElement('div');
                        ridePin.className = 'map-pin ride-pin';
                        ridePin.style.left = ride.mapX + '%';
                        ridePin.style.top = ride.mapY + '%';
                        ridePin.style.backgroundImage = `url('${ride.image}')`;
                        ridePin.style.backgroundSize = 'cover';
                        ridePin.style.backgroundPosition = 'center';
                        ridePin.setAttribute('data-name', ride.name);
                        
                        ridePin.onclick = (e) => {
                            e.stopPropagation(); 
                            openPopupMenu(landKey, rideKey);
                        };
                        mapPinsContainer.appendChild(ridePin);
                    }
                }
            }
        }
        renderMapPins();

        // --- THE CUSTOM POPUP LOGIC ---
        function openPopupMenu(landKey, rideKey) {
            closePopup(); 

            const ride = parkData[landKey].rides[rideKey];
            const tracks = ride.audioTracks;

            const popup = document.createElement('div');
            popup.className = 'custom-popup';
            popup.style.left = ride.mapX + '%';
            popup.style.top = ride.mapY + '%';

            let html = `<span class="close-popup" onclick="closePopup()">✕</span>
                        <h4>${ride.name}</h4>`;

            tracks.forEach((track, index) => {
                html += `<button onmousedown="event.stopPropagation()" onclick="queueSelectedTrack('${landKey}', '${rideKey}', ${index})">
                            ➕ ${track.title}
                         </button>`;
            });

            popup.innerHTML = html;
            document.getElementById('map-zoom-container').appendChild(popup);
            activePopup = popup;
        }

        function closePopup() {
            if (activePopup) {
                activePopup.remove();
                activePopup = null;
            }
        }

        document.getElementById('map-wrapper').addEventListener('mousedown', (e) => {
            if (!e.target.closest('.custom-popup') && !e.target.classList.contains('map-pin')) {
                closePopup();
            }
        });

        // --- QUEUE MANAGEMENT LOGIC ---
        function queueSelectedTrack(landKey, rideKey, trackIndex) {
            closePopup(); 
            addToItinerary(landKey, rideKey, trackIndex);
        }

        function addToItinerary(landKey, rideKey, trackIndex = 0) {
            const landData = parkData[landKey];
            const rideData = rideKey ? landData.rides[rideKey] : null;
            
            let titleText = rideData ? rideData.name : landData.name;
            let imageSrc = rideData ? rideData.image : landData.image;
            
            let subtitleText = "Atmosphere";
            let selectedTrack = null;
            if (rideData && rideData.audioTracks) {
                selectedTrack = rideData.audioTracks[trackIndex];
                subtitleText = `${landData.name} - ${selectedTrack.title}`;
            }

            if (itinerary.length === 0) { itineraryList.innerHTML = ''; }

            const itemId = nextItemId++; 
            itinerary.push({ land: landKey, ride: rideKey, trackIndex: trackIndex, id: itemId });

            const li = document.createElement('li');
            li.id = "itinerary-item-" + itemId; 
            li.innerHTML = `
                <img src="${imageSrc}" class="queue-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'44\\' height=\\'44\\'><rect width=\\'44\\' height=\\'44\\' fill=\\'%23333\\'/></svg>'">
                <div class="queue-info">
                    <span class="queue-title">${titleText}</span>
                    <span class="queue-subtitle">${subtitleText}</span>
                </div>
                <button class="remove-item-btn" onclick="removeFromItinerary(${itemId})" title="Remove">✕</button>
            `;
            itineraryList.appendChild(li);

            if (isWalkthroughActive) {
                const randomAmbient = landData.ambientAudio[Math.floor(Math.random() * landData.ambientAudio.length)];
                playbackQueue.push({
                    audio: randomAmbient, image: landData.image, landIcon: landData.icon, 
                    title: `Walking through ${landData.name}`, subtitle: "Atmosphere", targetId: "itinerary-item-" + itemId
                });

                if (rideData && selectedTrack) {
                    playbackQueue.push({
                        audio: selectedTrack.file, image: rideData.image, landIcon: landData.icon, 
                        title: rideData.name, subtitle: subtitleText, targetId: "itinerary-item-" + itemId
                    });
                }

                if (playPauseBtn.style.display === 'none') {
                    skipBtn.style.display = 'flex'; playPauseBtn.style.display = 'flex'; 
                    playPauseBtn.classList.remove('is-paused'); playPauseBtn.classList.add('is-playing');
                    progressContainer.style.display = 'flex'; volumeContainer.style.display = 'flex';
                    playNextInQueue();
                }
            }
        }

        function removeFromItinerary(id) {
            const li = document.getElementById("itinerary-item-" + id);
            const wasActive = li && li.classList.contains('active-item'); 
            if (li) li.remove(); 
            itinerary = itinerary.filter(item => item.id !== id);
            playbackQueue = playbackQueue.filter(step => step.targetId !== "itinerary-item-" + id);
            if (itinerary.length === 0) { itineraryList.innerHTML = '<li style="color: #555; padding: 10px 0;">Your queue is empty.</li>'; }
            if (wasActive) skipStep(); 
        }

        function clearItinerary() {
            isWalkthroughActive = false; 
            itinerary = []; playbackQueue = []; nextItemId = 0; closePopup();
            itineraryList.innerHTML = '<li style="color: #555; padding: 10px 0;">Your queue is empty.</li>';
            npTitle.textContent = 'Ready to Play'; npSubtitle.textContent = 'Build your queue above';
            npImage.style.display = 'none'; npImage.src = '';
            player1.pause(); player2.pause(); player1.src = ''; player2.src = '';
            skipBtn.style.display = 'none'; playPauseBtn.style.display = 'none';
            progressContainer.style.display = 'none'; volumeContainer.style.display = 'none';
        }

        function startWalkthrough() {
            if (itinerary.length === 0) { alert("Your queue is empty! Click some pins on the map first."); return; }
            isWalkthroughActive = true; 
            playbackQueue = []; 

            itinerary.forEach(item => {
                const landData = parkData[item.land];
                const randomAmbient = landData.ambientAudio[Math.floor(Math.random() * landData.ambientAudio.length)];
                playbackQueue.push({ audio: randomAmbient, image: landData.image, landIcon: landData.icon, title: `Walking through ${landData.name}`, subtitle: "Atmosphere", targetId: "itinerary-item-" + item.id });
                
                if (item.ride) {
                    const rideData = landData.rides[item.ride];
                    const selectedTrack = rideData.audioTracks[item.trackIndex];
                    playbackQueue.push({ audio: selectedTrack.file, image: rideData.image, landIcon: landData.icon, title: rideData.name, subtitle: `${landData.name} - ${selectedTrack.title}`, targetId: "itinerary-item-" + item.id });
                }
            });

            const lastItem = itinerary[itinerary.length - 1];
            const lastLandData = parkData[lastItem.land];
            const finalAmbient = lastLandData.ambientAudio[Math.floor(Math.random() * lastLandData.ambientAudio.length)];
            playbackQueue.push({ audio: finalAmbient, image: lastLandData.image, landIcon: lastLandData.icon, title: `Exiting into ${lastLandData.name}`, subtitle: "Atmosphere", targetId: "itinerary-item-" + lastItem.id });

            skipBtn.style.display = 'flex'; playPauseBtn.style.display = 'flex'; playPauseBtn.classList.remove('is-paused'); playPauseBtn.classList.add('is-playing');
            progressContainer.style.display = 'flex'; volumeContainer.style.display = 'flex';
            playNextInQueue();
        }

        // --- AUDIO PLAYER LOGIC ---
        function togglePlayPause() {
            const currentPlayer = activePlayer === 1 ? player1 : player2;
            if (currentPlayer.paused) { currentPlayer.play(); playPauseBtn.classList.remove('is-paused'); playPauseBtn.classList.add('is-playing'); playPauseBtn.title = 'Pause';
            } else { currentPlayer.pause(); playPauseBtn.classList.remove('is-playing'); playPauseBtn.classList.add('is-paused'); playPauseBtn.title = 'Play'; }
        }

        function skipStep() { playNextInQueue(); }

        // ✨ FIX 1: UPDATED QUEUE LOGIC ✨
        function playNextInQueue() {
            document.querySelectorAll('#itinerary-list li').forEach(li => li.classList.remove('active-item'));
            let currentPlayer = activePlayer === 1 ? player1 : player2;
            let nextPlayer = activePlayer === 1 ? player2 : player1;

            if (playbackQueue.length === 0) {
                npTitle.textContent = "Walkthrough Complete"; npSubtitle.textContent = "Hope you had a magical day!";
                npImage.style.display = "none"; skipBtn.style.display = 'none'; playPauseBtn.style.display = 'none';
                progressContainer.style.display = 'none'; volumeContainer.style.display = 'none'; 
                
                isWalkthroughActive = false; // ✨ NEW: Fully resets the state
                
                fadeOutSingle(currentPlayer); 
                return;
            }

            const currentStep = playbackQueue.shift(); 
            const activeListItem = document.getElementById(currentStep.targetId);
            if (activeListItem) activeListItem.classList.add('active-item');

            npTitle.textContent = currentStep.title; npSubtitle.textContent = currentStep.subtitle;
            if (currentStep.image) { npImage.src = currentStep.image; npImage.style.display = 'block'; } else { npImage.style.display = 'none'; }
            if (currentStep.landIcon) { progressSlider.style.setProperty('--thumb-icon', `url('${currentStep.landIcon}')`); } else { progressSlider.style.setProperty('--thumb-icon', `url('data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'16\\' height=\\'16\\'><circle cx=\\'8\\' cy=\\'8\\' r=\\'8\\' fill=\\'%23ffc107\\'/></svg>')`); }

            nextPlayer.src = currentStep.audio; nextPlayer.volume = 0; progressSlider.value = 0; timeCurrent.textContent = "0:00";
            playPauseBtn.classList.remove('is-paused'); playPauseBtn.classList.add('is-playing');
            
            nextPlayer.play().then(() => {
                if (!currentPlayer.paused && currentPlayer.src) { crossfade(currentPlayer, nextPlayer); } else { fadeInSingle(nextPlayer); }
                activePlayer = activePlayer === 1 ? 2 : 1;
            }).catch(e => { console.log("Audio not found: " + currentStep.audio); });
        }

        volumeSlider.addEventListener('input', (e) => { masterVolume = e.target.value / 100; const currentPlayer = activePlayer === 1 ? player1 : player2; if (!currentPlayer.paused) { currentPlayer.volume = masterVolume; } });
        function formatTime(seconds) { if (isNaN(seconds)) return "0:00"; const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60); return m + ":" + (s < 10 ? "0" + s : s); }
        function updateSliderProgress(e) { const currentPlayer = activePlayer === 1 ? player1 : player2; if (e.target !== currentPlayer) return; const current = currentPlayer.currentTime; const duration = currentPlayer.duration; timeCurrent.textContent = formatTime(current); if (duration) { timeTotal.textContent = formatTime(duration); progressSlider.max = duration; progressSlider.value = current; } }
        player1.addEventListener('timeupdate', updateSliderProgress); player2.addEventListener('timeupdate', updateSliderProgress);
        progressSlider.addEventListener('input', (e) => { const currentPlayer = activePlayer === 1 ? player1 : player2; const seekTime = e.target.value; currentPlayer.currentTime = seekTime; timeCurrent.textContent = formatTime(seekTime); });

        function crossfade(fadeOutPlayer, fadeInPlayer) { clearInterval(fadeInterval); let progress = 0; fadeInterval = setInterval(() => { progress += 0.05; if (progress >= 1) { clearInterval(fadeInterval); fadeInPlayer.volume = masterVolume; fadeOutPlayer.volume = 0; fadeOutPlayer.pause(); } else { fadeInPlayer.volume = progress * masterVolume; fadeOutPlayer.volume = (1 - progress) * masterVolume; } }, 100); }
        function fadeInSingle(player) { clearInterval(fadeInterval); let progress = 0; player.volume = 0; fadeInterval = setInterval(() => { progress += 0.05; if (progress >= 1) { clearInterval(fadeInterval); player.volume = masterVolume; } else { player.volume = progress * masterVolume; } }, 100); }
        
        // ✨ FIX 2: BULLETPROOF FADE OUT LOGIC ✨
        function fadeOutSingle(player) { 
            clearInterval(fadeInterval); 
            
            const otherPlayer = player === player1 ? player2 : player1;
            otherPlayer.pause();
            otherPlayer.src = ''; 
            
            let progress = 1; 
            fadeInterval = setInterval(() => { 
                progress -= 0.05; 
                if (progress <= 0) { 
                    clearInterval(fadeInterval); 
                    player.volume = 0; 
                    player.pause(); 
                    player.src = ''; 
                } else { 
                    player.volume = Math.max(0, Math.min(1, progress * masterVolume)); 
                } 
            }, 100); 
        }
        // ---------------------------------------

        player1.onended = function() { playNextInQueue(); }; player2.onended = function() { playNextInQueue(); };

        // --- VOLUME CONTROL LOGIC ---
        volumeSlider.addEventListener('input', (e) => {
            masterVolume = e.target.value / 100;
            const currentPlayer = activePlayer === 1 ? player1 : player2;
            if (!currentPlayer.paused) {
                currentPlayer.volume = masterVolume;
            }
        });
        
// --- SLIDER AND TIME TRACKING LOGIC ---
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        function updateSliderProgress(e) {
            const currentPlayer = activePlayer === 1 ? player1 : player2;
            if (e.target !== currentPlayer) return;

            const current = currentPlayer.currentTime;
            const duration = currentPlayer.duration;
            
            timeCurrent.textContent = formatTime(current);
            if (duration) {
                timeTotal.textContent = formatTime(duration);
                progressSlider.max = duration;
                progressSlider.value = current;
            }
        }

        player1.addEventListener('timeupdate', updateSliderProgress);
        player2.addEventListener('timeupdate', updateSliderProgress);

        progressSlider.addEventListener('input', (e) => {
            const currentPlayer = activePlayer === 1 ? player1 : player2;
            const seekTime = e.target.value;
            currentPlayer.currentTime = seekTime;
            timeCurrent.textContent = formatTime(seekTime);
        });

        // --- ZOOM & PAN JAVASCRIPT --- 
        let currentZoom = 100; 
        const zoomContainer = document.getElementById('map-zoom-container');
        const mapWrapper = document.getElementById('map-wrapper');

        function zoomMap(direction) {
            const zoomStep = 50; 
            const minZoom = 100; 
            const maxZoom = 400; 
            currentZoom += (direction * zoomStep);
            if (currentZoom < minZoom) currentZoom = minZoom;
            if (currentZoom > maxZoom) currentZoom = maxZoom;
            zoomContainer.style.width = currentZoom + '%';
        }

        mapWrapper.addEventListener('wheel', (e) => {
            e.preventDefault(); 
            if (e.deltaY < 0) { zoomMap(1); } else { zoomMap(-1); }
        }, { passive: false }); 

        let isDown = false;
        let startX, startY, scrollLeft, scrollTop;

        mapWrapper.addEventListener('mousedown', (e) => {
            isDown = true;
            mapWrapper.style.cursor = 'grabbing';
            startX = e.pageX - mapWrapper.offsetLeft;
            startY = e.pageY - mapWrapper.offsetTop;
            scrollLeft = mapWrapper.scrollLeft;
            scrollTop = mapWrapper.scrollTop;
        });
        
        mapWrapper.addEventListener('mouseleave', () => { isDown = false; mapWrapper.style.cursor = 'grab'; });
        mapWrapper.addEventListener('mouseup', () => { isDown = false; mapWrapper.style.cursor = 'grab'; });
        
        mapWrapper.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault(); 
            const x = e.pageX - mapWrapper.offsetLeft;
            const y = e.pageY - mapWrapper.offsetTop;
            const walkX = (x - startX) * 1.5; 
            const walkY = (y - startY) * 1.5; 
            mapWrapper.scrollLeft = scrollLeft - walkX;
            mapWrapper.scrollTop = scrollTop - walkY;
        });

    </script>
