<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Audio Player</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent-blue: #2979ff;
            --accent-gold: #ffc107;
            --player-bg: #181818;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MAIN APP LAYOUT --- */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding-bottom: 120px; 
        }

        .main-content {
            flex: 3;
            padding: 30px;
            overflow-y: auto;
        }

        .sidebar {
            flex: 1;
            min-width: 320px; /* Made slightly wider to comfortably fit images */
            background-color: #000000;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #282828;
        }

        h1 { margin-top: 0; font-size: 28px; }
        p.subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 30px; }

        h3.section-title {
            font-size: 18px;
            color: var(--text-main);
            border-bottom: 1px solid var(--bg-hover);
            padding-bottom: 10px;
            margin-top: 20px;
        }

        /* --- TILE GRID --- */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tile {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            text-align: center;
        }

        .tile:hover {
            background-color: var(--bg-hover);
            transform: translateY(-4px);
        }

        .tile.selected {
            background-color: var(--bg-hover);
            box-shadow: 0 0 0 2px var(--accent-blue);
        }

        .tile img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tile-label {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- BUTTONS --- */
        .action-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 20px;
        }
        .action-btn:hover { background-color: #1c63d6; transform: scale(1.05); }

        .start-btn {
            background-color: var(--accent-gold);
            color: #000;
            width: 100%;
            border: none;
            border-radius: 30px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.02); background-color: #e5ad06; }

        .clear-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
            border-radius: 20px;
            padding: 6px 15px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: color 0.2s, border-color 0.2s;
        }
        .clear-btn:hover { color: #ff4d4d; border-color: #ff4d4d; }

        /* --- QUEUE LIST (UPDATED FOR SPOTIFY-STYLE IMAGES) --- */
        #itinerary-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }
        #itinerary-list li {
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px; /* Space between image and text */
            transition: background 0.2s;
            cursor: default;
        }
        #itinerary-list li:hover { 
            background-color: var(--bg-hover); 
        }
        
        /* The mini album artwork */
        .queue-img {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
            flex-shrink: 0; /* Prevents image from squishing */
        }

        .queue-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .queue-title {
            color: var(--text-main);
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .queue-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Active styling overrides */
        .active-item {
            background-color: rgba(255, 193, 7, 0.1) !important;
            border-left: 3px solid var(--accent-gold);
            padding-left: 7px !important; /* Adjust padding to make room for border */
        }
        .active-item .queue-title {
            color: var(--accent-gold);
        }

        /* --- BOTTOM "NOW PLAYING" BAR --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background-color: var(--player-bg);
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .now-playing-info {
            display: flex;
            align-items: center;
            width: 30%;
        }

        #np-image {
            width: 80px; 
            height: 80px; 
            border-radius: 6px;
            object-fit: cover;
            margin-right: 20px;
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .np-text {
            display: flex;
            flex-direction: column;
        }

        #np-title {
            font-size: 18px; 
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        #np-subtitle {
            font-size: 14px; 
            color: var(--text-muted);
        }

        /* --- CENTER CONTROLS & SVG BUTTONS --- */
        .player-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 50%; 
            margin: 0 auto;
        }

        .player-controls {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .control-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            cursor: pointer;
            display: none; 
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        #play-pause-btn { 
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #003399, #005ce6); 
            border: 3px solid #ffcc00; 
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 204, 0, 0.3), inset 0 2px 5px rgba(255,255,255,0.4);
        }
        #play-pause-btn:hover { 
            transform: scale(1.1); 
            background: linear-gradient(135deg, #0040cc, #0073e6);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 204, 0, 0.6), inset 0 2px 5px rgba(255,255,255,0.5);
            border-color: #ffe680;
        }

        #skip-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2a2a2a, #444);
            border: 2px solid #a7a7a7;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
        #skip-btn:hover {
            transform: scale(1.1);
            border-color: #ffffff;
            background: linear-gradient(135deg, #333, #555);
        }

        .control-btn svg {
            fill: currentColor;
            width: 32px;
            height: 32px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
        }
        #skip-btn svg {
            width: 24px;
            height: 24px;
        }

        .icon-play, .icon-pause { display: none; }
        
        #play-pause-btn.is-paused .icon-play { 
            display: block; 
            margin-left: 5px; 
        }
        #play-pause-btn.is-playing .icon-pause { 
            display: block; 
        }

        /* --- MASSIVE PICTURE SCRUBBER --- */
        .progress-container {
            display: none; 
            align-items: center;
            width: 100%;
        }

        #time-current, #time-total {
            font-size: 14px; 
            color: var(--text-muted);
            min-width: 50px;
        }
        #time-current { text-align: right; }
        #time-total { text-align: left; }

        #progress-slider {
            flex: 1;
            margin: 0 20px; 
            cursor: pointer;
            -webkit-appearance: none; 
            background: transparent; 
            height: 48px; 
            --thumb-icon: url('data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'16\\' height=\\'16\\'><circle cx=\\'8\\' cy=\\'8\\' r=\\'8\\' fill=\\'%23ffc107\\'/></svg>'); 
        }

        #progress-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px; 
            background: #444;
            border-radius: 4px;
        }
        #progress-slider::-moz-range-track {
            width: 100%;
            height: 8px;
            background: #444;
            border-radius: 4px;
        }

        #progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 48px; 
            width: 48px;
            border-radius: 0; 
            border: none; 
            outline: none;
            
            background-image: var(--thumb-icon);
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent; 
            
            margin-top: -20px; 
            
            filter: drop-shadow(0px 3px 8px rgba(0,0,0,0.8));
            box-shadow: none; 
            transition: background-image 0.3s;
        }
        #progress-slider::-moz-range-thumb {
            height: 48px;
            width: 48px;
            border-radius: 0;
            border: none;
            outline: none;
            
            background-image: var(--thumb-icon);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            
            filter: drop-shadow(0px 3px 8px rgba(0,0,0,0.8));
            box-shadow: none;
            transition: background-image 0.3s;
        }

        .player-right {
            width: 30%;
        }

        .hidden-player { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="main-content">
            <h1>Disneyland Audio Player</h1>
            <p class="subtitle">Curate your perfect park walkthrough.</p>

            <h3 class="section-title">1. Select a Land</h3>
            <div id="lands-grid" class="tile-grid"></div>

            <div id="rides-section" style="display: none;">
                <h3 class="section-title">2. Select a Ride (Optional)</h3>
                <div id="rides-grid" class="tile-grid"></div>
            </div>

            <button class="action-btn" onclick="addToItinerary()">+ Add to Queue</button>
        </div>

        <div class="sidebar">
            <h3 class="section-title" style="margin-top: 0;">Up Next</h3>
            <ul id="itinerary-list">
                <li style="color: #555; padding: 10px 0;">Your queue is empty.</li>
            </ul>
            <button class="clear-btn" onclick="clearItinerary()">Clear Queue</button>
            <button class="start-btn" onclick="startWalkthrough()">▶ Play Walkthrough</button>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing-info">
            <img id="np-image" src="" alt="Album Art">
            <div class="np-text">
                <div id="np-title">Ready to Play</div>
                <div id="np-subtitle">Build your queue above</div>
            </div>
        </div>
        
        <div class="player-center">
            <div class="player-controls">
                <button id="play-pause-btn" class="control-btn is-playing" onclick="togglePlayPause()" title="Pause">
                    <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="skip-btn" class="control-btn" onclick="skipStep()" title="Skip to Next">
                    <svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                </button>
            </div>
            
            <div class="progress-container" id="progress-container">
                <span id="time-current">0:00</span>
                <input type="range" id="progress-slider" min="0" value="0" step="1">
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="player-right"></div>
    </div>

    <audio id="player-1" class="hidden-player"></audio>
    <audio id="player-2" class="hidden-player"></audio>

    <script>
        const parkData = {
            mainStreet: {

                 // 👉 UPDATE THESE ICON PATHS with your actual file names
                icon: "images/Trolly.png",

                }
            },
            adventureland: {
                name: "Adventureland",
                image: "images/Adventureland.png",
                  // 👉 UPDATE THESE ICON PATHS with your actual file names
                icon: "images/IndyCar.png", 
                ambientAudio: ["Audio/Adventure1.mp3", "Audio/Adventure2.mp3", "Audio/Adventure3.mp3", "Audio/Adventure4.mp3"],

                    Tarzan: { name: "Tarzan's Treehouse", image: "images/Adventureland Tree House.png", audio: "Audio/Tarzan.mp3" }
                }
            },
            NewOrleansSquare: {
                name: "New Orleans Square",
                image: "images/New Orleans Square.png",
                  // 👉 UPDATE THESE ICON PATHS with your actual file names
                icon: "images/FlagIcon.png", 
                ambientAudio: ["Audio/NOS1.mp3", "Audio/NOS2.mp3","Audio/NOS3.mp3"],
                rides: {
                    Pirates: { name: "Pirates of the Carribean", image: "images/Pirates of the Caribbean.png", audio: "Audio/Pirates.mp3" },
                    HauntedMansion: { name: "Haunted Mansion", image: "images/Haunted Mansion.png", audio: "Audio/Haunted.mp3" }
                }
            },
            CritterCountry: {
                name: "Critter Country",
                image: "images/Splash Mountain.png",
                  // 👉 UPDATE THESE ICON PATHS with your actual file names
                icon: "images/SplashIcon.png", 
                ambientAudio: ["Audio/CC1.mp3","Audio/CC2.mp3","Audio/CC3.mp3", "Audio/CC4.mp3"],
                rides: {
                    Splash: { name: "Splash Mountain", image: "images/Splash Mountain.png", audio: "Audio/Splash.mp3" },
                    WinnieThePooh: { name: "Winnie The Pooh", image: "images/The Many Adventures of Winnie the Pooh.png", audio: "Audio/Pooh.mp3" }
                }
            },
            Frontierland: {
                name: "Frontierland",
                image: "images/Frontierland.png",
                  // 👉 UPDATE THESE ICON PATHS with your actual file names
                icon: "images/ThunderIcon.png", 
                ambientAudio: ["Audio/Frontier1.mp3", "Audio/Frontier2.mp3", "Audio/Frontier3.mp3"],
                rides: {
                    BigThunder: { name: "Big Thunder Mountain Railroad", image: "images/Big Thunder Mountain Railroad.png", audio: "Audio/Big Thunder.mp3" },
                    Twain: { name: "The Mark Twain Riverboat", image: "images/Mark Twain River Boat.png", audio: "Audio/TShip.mp3" }
                }
            },
            fantasyland: {
                name: "Fantasyland",
                image: "images/Sleeping Beauty Castle.png",
                  // 👉 UPDATE THESE ICON PATHS with your actual file names
                icon: "images/CastleIcon.png", 
                ambientAudio: ["Audio/Fantasy1.mp3", "Audio/Fantasy2.mp3", "Audio/Fantasy3.mp3", "Audio/Fantasy4.mp3"],
                rides: {
                    peterPan: { name: "Peter Pan's Flight", image: "images/Dark Rides 3.png", audio: "Audio/Peter.mp3" },
                    smallWorld: { name: "It's a Small World", image: "images/It_s a Small World.png", audio: "Audio/SmallWorld.mp3" },
                    Snowwhite: { name: "Snow White's Enchanted Wish", image: "images/Dark Rides 1.png", audio: "Audio/Snow.mp3" },
                    Dumbo: { name: "Dumbo The Flying Elephant", image: "images/Dumbo Flying Elephants.png", audio: "Audio/Dumbo.mp3" },
                    Toads: { name: "Mr. Toads Wild Ride", image: "images/Dark Rides 4.png", audio: "Audio/Toads.mp3" },
                    Matterhorn: { name: "Matterhorn", image: "images/Matterhorn Bobsleds.png", audio: "Audio/Matterhron.mp3" },
                    Story: { name: "Storybookland Canal Boats", image: "images/Storybook Land.png", audio: "Audio/Storybook.mp3" },
                    Carrousel: { name: "King Arthur Carrousel", image: "images/Carrousel.jpg", audio: "Audio/Carrousel.mp3" },
                    Pinnocchio: { name: "Pinocchio's Daring Journey", image: "images/Dark Rides 2.png", audio: "Audio/Pinocchios.mp3" },
                    Cups: { name: "Mad Tea Party", image: "images/Cups.png", audio: "Audio/Teacups.mp3" },
                    Alice: { name: "Alice in Wonderland", image: "images/Alice in Wonderland.png", audio: "Audio/Alice.mp3" },
                    Casey: { name: "Casey Jr Circus Train", image: "images/Casey.png", audio: "Audio/Casey.mp3" }
                }
            },
            Toontown: {
                name: "Toontown",
                image: "images/Toontown Area Music.png",
                  // 👉 UPDATE THESE ICON PATHS with your actual file names
                icon: "images/icon_train.png", 
                ambientAudio: ["Audio/Toon1.mp3", "Audio/Toon2.mp3"],
                rides: {
                    Railroad: { name: "Mickey and Minnie's Runaway Railway", image: "images/Runaway.jpg", audio: "Audio/Runaway.mp3" },
                    Rodger: { name: "Rodger Rabbits Cartoon Spin", image: "images/Toontown Area Music.png", audio: "Audio/Rabbit.mp3" }
                }
            },
            tomorrowland: {
                name: "Tomorrowland",
                image: "images/Tomorrowland.png",
                icon: "images/Space Icon.png", 
                ambientAudio: ["Audio/TL1.mp3","Audio/TL2.mp3"],
                rides: {
                    spaceMountain: { name: "Space Mountain", image: "images/Space Mountain.png", audio: "audio/space_mountain.mp3" },
                    starTours: { name: "Star Tours", image: "images/Star Tours.png", audio: "audio/star_tours.mp3" },
                    Buzz: { name: "Buzz Lightyear's Space Ranger Spin", image: "images/Buzz.png", audio: "Audio/Buzz.mp3" },
                    Carousel: { name: "Carousel of Progress", image: "images/Carousel of Progress.png", audio: "audio/star_tours.mp3" },
                    Nemo: { name: "Finding Nemo Submarine Voyage", image: "images/star_tours.jpg", audio: "audio/star_tours.mp3" },
                }
            }
        };
        const landsGrid = document.getElementById('lands-grid');
        const ridesSection = document.getElementById('rides-section');
        const ridesGrid = document.getElementById('rides-grid');
        const itineraryList = document.getElementById('itinerary-list');
        
        // Player Bar UI Elements
        const npTitle = document.getElementById('np-title');
        const npSubtitle = document.getElementById('np-subtitle');
        const npImage = document.getElementById('np-image');
        const skipBtn = document.getElementById('skip-btn');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressSlider = document.getElementById('progress-slider');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');

        let currentSelectedLand = "";
        let currentSelectedRide = "";
        let itinerary = []; 
        let playbackQueue = []; 

        const player1 = document.getElementById('player-1');
        const player2 = document.getElementById('player-2');
        let activePlayer = 1; 
        let fadeInterval;

        function renderLands() {
            landsGrid.innerHTML = "";
            for (const landKey in parkData) {
                const land = parkData[landKey];
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `land-tile-${landKey}`;
                tile.onclick = () => selectLand(landKey);
                
                tile.innerHTML = `
                    <img src="${land.image}" alt="${land.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%23333\\'/></svg>'">
                    <p class="tile-label">${land.name}</p>
                `;
                landsGrid.appendChild(tile);
            }
        }

        function selectLand(landKey) {
            currentSelectedLand = landKey;
            currentSelectedRide = ""; 
            document.querySelectorAll('#lands-grid .tile').forEach(t => t.classList.remove('selected'));
            document.getElementById(`land-tile-${landKey}`).classList.add('selected');
            renderRides(landKey);
        }

        function renderRides(landKey) {
            ridesGrid.innerHTML = "";
            ridesSection.style.display = "block"; 
            const rides = parkData[landKey].rides;
            
            for (const rideKey in rides) {
                const ride = rides[rideKey];
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `ride-tile-${rideKey}`;
                tile.onclick = () => selectRide(rideKey);
                
                tile.innerHTML = `
                    <img src="${ride.image}" alt="${ride.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%23333\\'/></svg>'">
                    <p class="tile-label">${ride.name}</p>
                `;
                ridesGrid.appendChild(tile);
            }
        }

        function selectRide(rideKey) {
            if (currentSelectedRide === rideKey) {
                currentSelectedRide = "";
                document.getElementById(`ride-tile-${rideKey}`).classList.remove('selected');
                return;
            }
            currentSelectedRide = rideKey;
            document.querySelectorAll('#rides-grid .tile').forEach(t => t.classList.remove('selected'));
            document.getElementById(`ride-tile-${rideKey}`).classList.add('selected');
        }

        renderLands();

        // --- UPDATED LOGIC TO INJECT IMAGES INTO THE QUEUE ---
        function addToItinerary() {
            if (!currentSelectedLand) {
                alert("Please select a land first!");
                return;
            }

            if (itinerary.length === 0) {
                itineraryList.innerHTML = ''; 
            }

            const landData = parkData[currentSelectedLand];
            let titleText = currentSelectedRide ? landData.rides[currentSelectedRide].name : landData.name;
            let subtitleText = currentSelectedRide ? landData.name : "Atmosphere";
            let imageSrc = currentSelectedRide ? landData.rides[currentSelectedRide].image : landData.image;

            const itemIndex = itinerary.length;
            itinerary.push({ land: currentSelectedLand, ride: currentSelectedRide, index: itemIndex });

            const li = document.createElement('li');
            li.id = "itinerary-item-" + itemIndex; 
            
            li.innerHTML = `
                <img src="${imageSrc}" class="queue-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'44\\' height=\\'44\\'><rect width=\\'44\\' height=\\'44\\' fill=\\'%23333\\'/></svg>'">
                <div class="queue-info">
                    <span class="queue-title">${titleText}</span>
                    <span class="queue-subtitle">${subtitleText}</span>
                </div>
            `;
            
            itineraryList.appendChild(li);

            currentSelectedLand = "";
            currentSelectedRide = "";
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            ridesSection.style.display = "none";
        }

        function clearItinerary() {
            itinerary = [];
            playbackQueue = [];
            itineraryList.innerHTML = '<li style="color: #555; padding: 10px 0;">Your queue is empty.</li>';
            
            npTitle.textContent = 'Ready to Play';
            npSubtitle.textContent = 'Build your queue above';
            npImage.style.display = 'none';
            npImage.src = '';
            
            player1.pause();
            player2.pause();
            player1.src = '';
            player2.src = '';
            
            skipBtn.style.display = 'none';
            playPauseBtn.style.display = 'none';
            progressContainer.style.display = 'none';
        }

        function startWalkthrough() {
            if (itinerary.length === 0) {
                alert("Your queue is empty! Add some stops first.");
                return;
            }

            playbackQueue = []; 

            itinerary.forEach(item => {
                const landData = parkData[item.land];
                const randomAmbient = landData.ambientAudio[Math.floor(Math.random() * landData.ambientAudio.length)];
                
                playbackQueue.push({
                    audio: randomAmbient,
                    image: landData.image,
                    landIcon: landData.icon, 
                    title: `Walking through ${landData.name}`,
                    subtitle: "Atmosphere",
                    targetId: "itinerary-item-" + item.index
                });

                if (item.ride) {
                    const rideData = landData.rides[item.ride];
                    playbackQueue.push({
                        audio: rideData.audio,
                        image: rideData.image,
                        landIcon: landData.icon, 
                        title: rideData.name,
                        subtitle: landData.name,
                        targetId: "itinerary-item-" + item.index
                    });
                }
            });

            const lastItem = itinerary[itinerary.length - 1];
            const lastLandData = parkData[lastItem.land];
            const finalAmbient = lastLandData.ambientAudio[Math.floor(Math.random() * lastLandData.ambientAudio.length)];
            
            playbackQueue.push({
                audio: finalAmbient,
                image: lastLandData.image,
                landIcon: lastLandData.icon, 
                title: `Exiting into ${lastLandData.name}`,
                subtitle: "Atmosphere",
                targetId: "itinerary-item-" + lastItem.index
            });

            skipBtn.style.display = 'flex';
            playPauseBtn.style.display = 'flex'; 
            playPauseBtn.classList.remove('is-paused');
            playPauseBtn.classList.add('is-playing');
            progressContainer.style.display = 'flex';
            playNextInQueue();
        }

        function togglePlayPause() {
            const currentPlayer = activePlayer === 1 ? player1 : player2;
            
            if (currentPlayer.paused) {
                currentPlayer.play();
                playPauseBtn.classList.remove('is-paused');
                playPauseBtn.classList.add('is-playing');
                playPauseBtn.title = 'Pause';
            } else {
                currentPlayer.pause();
                playPauseBtn.classList.remove('is-playing');
                playPauseBtn.classList.add('is-paused');
                playPauseBtn.title = 'Play';
            }
        }

        function skipStep() { playNextInQueue(); }

        function playNextInQueue() {
            const allItems = document.querySelectorAll('#itinerary-list li');
            allItems.forEach(li => li.classList.remove('active-item'));

            let currentPlayer = activePlayer === 1 ? player1 : player2;
            let nextPlayer = activePlayer === 1 ? player2 : player1;

            if (playbackQueue.length === 0) {
                npTitle.textContent = "Walkthrough Complete";
                npSubtitle.textContent = "Hope you had a magical day!";
                npImage.style.display = "none";
                skipBtn.style.display = 'none';
                playPauseBtn.style.display = 'none';
                progressContainer.style.display = 'none';
                fadeOutSingle(currentPlayer);
                return;
            }

            const currentStep = playbackQueue.shift(); 

            if (currentStep.targetId) {
                const activeListItem = document.getElementById(currentStep.targetId);
                if (activeListItem) activeListItem.classList.add('active-item');
            }

            npTitle.textContent = currentStep.title;
            npSubtitle.textContent = currentStep.subtitle;
            
            if (currentStep.image) {
                npImage.src = currentStep.image;
                npImage.style.display = 'block';
            } else {
                npImage.style.display = 'none';
            }

            if (currentStep.landIcon) {
                progressSlider.style.setProperty('--thumb-icon', `url('${currentStep.landIcon}')`);
            } else {
                progressSlider.style.setProperty('--thumb-icon', `url('data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'16\\' height=\\'16\\'><circle cx=\\'8\\' cy=\\'8\\' r=\\'8\\' fill=\\'%23ffc107\\'/></svg>')`);
            }

            nextPlayer.src = currentStep.audio;
            nextPlayer.volume = 0; 
            
            progressSlider.value = 0;
            timeCurrent.textContent = "0:00";
            
            playPauseBtn.classList.remove('is-paused');
            playPauseBtn.classList.add('is-playing');
            
            nextPlayer.play().then(() => {
                if (!currentPlayer.paused && currentPlayer.src) {
                    crossfade(currentPlayer, nextPlayer);
                } else {
                    fadeInSingle(nextPlayer);
                }
                activePlayer = activePlayer === 1 ? 2 : 1;
            }).catch(e => {
                console.log("Audio not found: " + currentStep.audio);
            });
        }

        // --- SLIDER AND TIME TRACKING LOGIC ---
        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        function updateSliderProgress(e) {
            const currentPlayer = activePlayer === 1 ? player1 : player2;
            if (e.target !== currentPlayer) return;

            const current = currentPlayer.currentTime;
            const duration = currentPlayer.duration;
            
            timeCurrent.textContent = formatTime(current);
            if (duration) {
                timeTotal.textContent = formatTime(duration);
                progressSlider.max = duration;
                progressSlider.value = current;
            }
        }

        player1.addEventListener('timeupdate', updateSliderProgress);
        player2.addEventListener('timeupdate', updateSliderProgress);

        progressSlider.addEventListener('input', (e) => {
            const currentPlayer = activePlayer === 1 ? player1 : player2;
            const seekTime = e.target.value;
            currentPlayer.currentTime = seekTime;
            timeCurrent.textContent = formatTime(seekTime);
        });

        // --- CROSSFADING LOGIC ---
        function crossfade(fadeOutPlayer, fadeInPlayer) {
            clearInterval(fadeInterval);
            let volume = 0;
            fadeInterval = setInterval(() => {
                volume += 0.05; 
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    fadeInPlayer.volume = 1;
                    fadeOutPlayer.volume = 0;
                    fadeOutPlayer.pause(); 
                } else {
                    fadeInPlayer.volume = volume;
                    fadeOutPlayer.volume = 1 - volume;
                }
            }, 100); 
        }

        function fadeInSingle(player) {
            clearInterval(fadeInterval);
            let volume = 0;
            player.volume = 0;
            fadeInterval = setInterval(() => {
                volume += 0.05;
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    player.volume = 1;
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        function fadeOutSingle(player) {
            clearInterval(fadeInterval);
            let volume = player.volume;
            fadeInterval = setInterval(() => {
                volume -= 0.05;
                if (volume <= 0) {
                    clearInterval(fadeInterval);
                    player.volume = 0;
                    player.pause();
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        player1.onended = function() { playNextInQueue(); };
        player2.onended = function() { playNextInQueue(); };

    </script>
</body>
</html>
