<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Audio Player</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent-blue: #2979ff;
            --accent-gold: #ffc107;
            --player-bg: #181818;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MAIN APP LAYOUT --- */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding-bottom: 120px; 
        }

        .main-content {
            flex: 3;
            padding: 30px;
            overflow-y: hidden; /* Changed to hidden so the map handles all scrolling */
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .sidebar {
            flex: 1;
            min-width: 320px; 
            background-color: #000000;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #282828;
        }

        /* Added flex-shrink: 0 so titles stay visible above the giant map */
        h1 { margin-top: 0; font-size: 28px; width: 100%; text-align: left; flex-shrink: 0; }
        p.subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 20px; width: 100%; text-align: left; flex-shrink: 0; }

        h3.section-title {
            font-size: 18px;
            color: var(--text-main);
            border-bottom: 1px solid var(--bg-hover);
            padding-bottom: 10px;
            margin-top: 20px;
            width: 100%;
        }

        /* =========================================
           ✨ DYNAMIC PAN & ZOOM MAP STYLES ✨ 
           ========================================= */
        .map-outer-container {
            position: relative;
            width: 100%;
            flex: 1; /* ✨ MAGIC ✨ Eats all remaining vertical space */
            display: flex;
            flex-direction: column;
            margin-top: 10px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 2px solid #333;
            overflow: hidden; /* Keeps the zoom buttons inside the frame */
            background-color: #000;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            flex: 1; 
            height: 100%; /* ✨ MAGIC ✨ Fills the outer container perfectly */
            overflow: auto; /* Enables native panning/scrolling */
            cursor: grab;
            
            /* Hides the ugly native scrollbars */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .map-wrapper::-webkit-scrollbar { display: none; }
        .map-wrapper:active { cursor: grabbing; }
