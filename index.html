<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Walkthrough Builder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            text-align: center;
            padding: 30px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        select, button {
            padding: 10px;
            margin: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #0066cc;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }
        button:hover {
            background-color: #004c99;
        }
        .start-btn {
            background-color: #28a745;
            width: 100%;
            font-size: 18px;
            padding: 15px;
            margin-top: 20px;
        }
        .start-btn:hover {
            background-color: #218838;
        }
        .clear-btn {
            background-color: #dc3545;
            font-size: 14px;
            padding: 8px 15px;
        }
        .clear-btn:hover {
            background-color: #c82333;
        }
        #skip-btn {
            background-color: #ff9800; 
            display: none; 
            margin-top: 15px;
            width: 100%;
            font-size: 16px;
            padding: 12px;
        }
        #skip-btn:hover {
            background-color: #e68a00;
        }
        #itinerary-container {
            text-align: left;
            background: #fdfdfd;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
        }
        #itinerary-list {
            padding-left: 0;
        }
        #itinerary-list li {
            list-style-type: none;
            padding: 10px;
            margin-bottom: 5px;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
            border-left: 5px solid transparent;
            transition: all 0.3s ease;
        }
        .active-item {
            background-color: #fff3cd !important;
            font-weight: bold;
            border-left: 5px solid #ffc107 !important;
            transform: scale(1.02);
        }
        #story-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #e9ecef;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.5;
            min-height: 60px;
        }
        #display-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        /* Hide the audio players since we handle them via code now */
        .hidden-player {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Disneyland Walkthrough Builder</h1>
        <p>Design your day. Add lands and rides to your itinerary, then press Start!</p>

        <!-- Dropdowns -->
        <select id="land-select" onchange="updateRides()">
            <option value="">-- Choose a Land --</option>
            <option value="mainStreet">Main Street, U.S.A.</option>
            <option value="adventureland">Adventureland</option>
            <option value="fantasyland">Fantasyland</option>
            <option value="tomorrowland">Tomorrowland</option>
        </select>

        <select id="ride-select">
            <option value="">-- Choose a Ride (Optional) --</option>
        </select>

        <button onclick="addToItinerary()">Add to Itinerary</button>

        <div id="itinerary-container">
            <h3>Your Plan:</h3>
            <ul id="itinerary-list"></ul>
            <button class="clear-btn" onclick="clearItinerary()">🗑️ Clear Itinerary</button>
        </div>

        <button class="start-btn" onclick="startWalkthrough()">▶ Start My Walkthrough</button>

        <div id="story-box">Build your itinerary above!</div>
        <img id="display-image" src="" alt="Park Location">
        
        <button id="skip-btn" onclick="skipStep()">⏭️ Skip to Next</button>

        <!-- Two hidden audio players for DJ-style crossfading -->
        <audio id="player-1" class="hidden-player"></audio>
        <audio id="player-2" class="hidden-player"></audio>
    </div>

    <script>
        const parkData = {
            mainStreet: {
                name: "Main Street, U.S.A.",
                image: "images/main_street.jpg",
                ambientAudio: ["Audio/Main Street2.mp3", "Audio/Mainstreet3.mp3"],
                rides: {
                    train: { name: "Disneyland Railroad", image: "images/train.jpg", audio: "audio/train_ride.mp3" },
                    cinema: { name: "Main Street Cinema", image: "images/cinema.jpg", audio: "audio/cinema_bgm.mp3" }
                }
            },
            adventureland: {
                name: "Adventureland",
                image: "images/adventureland.jpg",
                ambientAudio: ["Audio/Adventureland 1.mp3", "Audio/Adventureland 2.mp3"],
                rides: {
                    indy: { name: "Indiana Jones Adventure", image: "images/indy.jpg", audio: "Audio/Indiana.mp3" },
                    jungle: { name: "The Tiki Room", image: "images/jungle.jpg", audio: "Audio/Tiki Room.mp3" }
                }
            },
            fantasyland: {
                name: "Fantasyland",
                image: "images/fantasyland.jpg",
                ambientAudio: ["Audio/fantasyland_1.mp3", "Audio/Fantastyland 3.mp3"],
                rides: {
                    peterPan: { name: "Peter Pan's Flight", image: "images/peter_pan.jpg", audio: "audio/peter_pan.mp3" },
                    smallWorld: { name: "It's a Small World", image: "images/small_world.jpg", audio: "Audio/SmallWorld.mp3" }
                }
            },
            tomorrowland: {
                name: "Tomorrowland",
                image: "images/tomorrowland.jpg",
                ambientAudio: ["audio/tomorrow_bgm1.mp3"],
                rides: {
                    spaceMountain: { name: "Space Mountain", image: "images/space.jpg", audio: "audio/space_mountain.mp3" },
                    starTours: { name: "Star Tours", image: "images/star_tours.jpg", audio: "audio/star_tours.mp3" }
                }
            }
        };

        const landSelect = document.getElementById('land-select');
        const rideSelect = document.getElementById('ride-select');
        const itineraryList = document.getElementById('itinerary-list');
        const storyBox = document.getElementById('story-box');
        const displayImage = document.getElementById('display-image');
        const skipBtn = document.getElementById('skip-btn');

        // Audio System Variables
        const player1 = document.getElementById('player-1');
        const player2 = document.getElementById('player-2');
        let activePlayer = 1; // Tracks which player is currently audible
        let fadeInterval; // Used to manage the timing of the volume fade

        let itinerary = []; 
        let playbackQueue = []; 

        function updateRides() {
            const selectedLand = landSelect.value;
            rideSelect.innerHTML = '<option value="">-- Choose a Ride (Optional) --</option>';
            if (selectedLand && parkData[selectedLand]) {
                const rides = parkData[selectedLand].rides;
                for (const rideKey in rides) {
                    const option = document.createElement('option');
                    option.value = rideKey;
                    option.text = rides[rideKey].name;
                    rideSelect.appendChild(option);
                }
            }
        }

        function addToItinerary() {
            const landKey = landSelect.value;
            const rideKey = rideSelect.value;

            if (!landKey) {
                alert("Please select a land first!");
                return;
            }

            const landData = parkData[landKey];
            let displayText = landData.name;
            if (rideKey) displayText += " ➔ " + landData.rides[rideKey].name;

            const itemIndex = itinerary.length;
            itinerary.push({ land: landKey, ride: rideKey, index: itemIndex });

            const li = document.createElement('li');
            li.textContent = displayText;
            li.id = "itinerary-item-" + itemIndex; 
            itineraryList.appendChild(li);

            landSelect.value = "";
            updateRides();
        }

        function clearItinerary() {
            itinerary = [];
            playbackQueue = [];
            itineraryList.innerHTML = '';
            storyBox.innerHTML = 'Build your itinerary above!';
            displayImage.style.display = 'none';
            
            // Stop both players
            player1.pause();
            player2.pause();
            player1.src = '';
            player2.src = '';
            
            skipBtn.style.display = 'none';
        }

        function startWalkthrough() {
            if (itinerary.length === 0) {
                alert("Your itinerary is empty! Add some stops first.");
                return;
            }

            playbackQueue = []; 

            itinerary.forEach(item => {
                const landData = parkData[item.land];
                const randomAmbient = landData.ambientAudio[Math.floor(Math.random() * landData.ambientAudio.length)];
                
                playbackQueue.push({
                    audio: randomAmbient,
                    image: landData.image,
                    text: `Walking through ${landData.name}...`,
                    targetId: "itinerary-item-" + item.index
                });

                if (item.ride) {
                    const rideData = landData.rides[item.ride];
                    playbackQueue.push({
                        audio: rideData.audio,
                        image: rideData.image,
                        text: `Riding ${rideData.name}!`,
                        targetId: "itinerary-item-" + item.index
                    });
                }
            });

            const lastItem = itinerary[itinerary.length - 1];
            const lastLandData = parkData[lastItem.land];
            const finalAmbient = lastLandData.ambientAudio[Math.floor(Math.random() * lastLandData.ambientAudio.length)];
            
            playbackQueue.push({
                audio: finalAmbient,
                image: lastLandData.image,
                text: `Exiting back into ${lastLandData.name}...`,
                targetId: "itinerary-item-" + lastItem.index
            });

            skipBtn.style.display = 'block';
            playNextInQueue();
        }

        function skipStep() {
            playNextInQueue();
        }

        function playNextInQueue() {
            // Remove previous UI highlights
            const allItems = document.querySelectorAll('#itinerary-list li');
            allItems.forEach(li => li.classList.remove('active-item'));

            let currentPlayer = activePlayer === 1 ? player1 : player2;
            let nextPlayer = activePlayer === 1 ? player2 : player1;

            if (playbackQueue.length === 0) {
                storyBox.innerHTML = "Your magical day has come to an end!";
                displayImage.style.display = "none";
                skipBtn.style.display = 'none';
                
                // Fade out the last song to complete silence
                fadeOutSingle(currentPlayer);
                return;
            }

            const currentStep = playbackQueue.shift(); 

            // Highlight the new UI element
            if (currentStep.targetId) {
                const activeListItem = document.getElementById(currentStep.targetId);
                if (activeListItem) activeListItem.classList.add('active-item');
            }

            // Update text and image
            storyBox.innerHTML = currentStep.text;
            if (currentStep.image) {
                displayImage.src = currentStep.image;
                displayImage.style.display = 'block';
            } else {
                displayImage.style.display = 'none';
            }

            // --- THE CROSSFADE MAGIC ---
            nextPlayer.src = currentStep.audio;
            nextPlayer.volume = 0; // Start at zero volume
            
            nextPlayer.play().then(() => {
                // If a song is currently playing, crossfade them. Otherwise, just fade the first one in.
                if (!currentPlayer.paused && currentPlayer.src) {
                    crossfade(currentPlayer, nextPlayer);
                } else {
                    fadeInSingle(nextPlayer);
                }
                // Switch the active player tag for the next round
                activePlayer = activePlayer === 1 ? 2 : 1;
            }).catch(e => {
                console.log("Audio not found: " + currentStep.audio);
            });
        }

        // Fades one player OUT while fading the other IN over 2 seconds
        function crossfade(fadeOutPlayer, fadeInPlayer) {
            clearInterval(fadeInterval);
            let volume = 0;
            
            fadeInterval = setInterval(() => {
                volume += 0.05; // 5% volume change per tick
                
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    fadeInPlayer.volume = 1;
                    fadeOutPlayer.volume = 0;
                    fadeOutPlayer.pause(); // Turn off the old player to save resources
                } else {
                    fadeInPlayer.volume = volume;
                    fadeOutPlayer.volume = 1 - volume;
                }
            }, 100); // Ticks every 100 milliseconds
        }

        // Fades a single player IN (used for the very first track)
        function fadeInSingle(player) {
            clearInterval(fadeInterval);
            let volume = 0;
            player.volume = 0;
            
            fadeInterval = setInterval(() => {
                volume += 0.05;
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    player.volume = 1;
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        // Fades a single player OUT (used for the very end of the walkthrough)
        function fadeOutSingle(player) {
            clearInterval(fadeInterval);
            let volume = player.volume;
            
            fadeInterval = setInterval(() => {
                volume -= 0.05;
                if (volume <= 0) {
                    clearInterval(fadeInterval);
                    player.volume = 0;
                    player.pause();
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        // When a track finishes naturally, trigger the next one
        player1.onended = function() { playNextInQueue(); };
        player2.onended = function() { playNextInQueue(); };

    </script>
</body>
</html>
