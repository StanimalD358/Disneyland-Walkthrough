<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Audio Player</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent-blue: #2979ff;
            --accent-gold: #ffc107;
            --player-bg: #181818;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MAIN APP LAYOUT --- */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding-bottom: 90px; 
        }

        .main-content {
            flex: 3;
            padding: 30px;
            overflow-y: auto;
        }

        .sidebar {
            flex: 1;
            min-width: 300px;
            background-color: #000000;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #282828;
        }

        h1 { margin-top: 0; font-size: 28px; }
        p.subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 30px; }

        h3.section-title {
            font-size: 18px;
            color: var(--text-main);
            border-bottom: 1px solid var(--bg-hover);
            padding-bottom: 10px;
            margin-top: 20px;
        }

        /* --- TILE GRID --- */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tile {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            text-align: center;
        }

        .tile:hover {
            background-color: var(--bg-hover);
            transform: translateY(-4px);
        }

        .tile.selected {
            background-color: var(--bg-hover);
            box-shadow: 0 0 0 2px var(--accent-blue);
        }

        .tile img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tile-label {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- BUTTONS --- */
        .action-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 20px;
        }
        .action-btn:hover { background-color: #1c63d6; transform: scale(1.05); }

        .start-btn {
            background-color: var(--accent-gold);
            color: #000;
