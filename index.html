<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Audio Player</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent-blue: #2979ff;
            --accent-gold: #ffc107;
            --player-bg: #181818;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MAIN APP LAYOUT --- */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding-bottom: 120px; 
        }

        .main-content {
            flex: 3;
            padding: 30px;
            overflow-y: auto;
        }

        .sidebar {
            flex: 1;
            min-width: 320px; /* Made slightly wider to comfortably fit images */
            background-color: #000000;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #282828;
        }

        h1 { margin-top: 0; font-size: 28px; }
        p.subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 30px; }

        h3.section-title {
            font-size: 18px;
            color: var(--text-main);
            border-bottom: 1px solid var(--bg-hover);
            padding-bottom: 10px;
            margin-top: 20px;
        }

        /* --- TILE GRID --- */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tile {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            text-align: center;
        }

        .tile:hover {
            background-color: var(--bg-hover);
            transform: translateY(-4px);
        }

        .tile.selected {
            background-color: var(--bg-hover);
            box-shadow: 0 0 0 2px var(--accent-blue);
        }

        .tile img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tile-label {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- BUTTONS --- */
        .action-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 20px;
        }
        .action-btn:hover { background-color: #1c63d6; transform: scale(1.05); }

        .start-btn {
            background-color: var(--accent-gold);
            color: #000;
            width: 100%;
            border: none;
            border-radius: 30px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.02); background-color: #e5ad06; }

        .clear-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
            border-radius: 20px;
            padding: 6px 15px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: color 0.2s, border-color 0.2s;
        }
        .clear-btn:hover { color: #ff4d4d; border-color: #ff4d4d; }

        /* --- QUEUE LIST (UPDATED FOR SPOTIFY-STYLE IMAGES) --- */
        #itinerary-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }
        #itinerary-list li {
            padding: 10px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px; /* Space between image and text */
            transition: background 0.2s;
            cursor: default;
        }
        #itinerary-list li:hover { 
            background-color: var(--bg-hover); 
        }
        
        /* The mini album artwork */
        .queue-img {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
            flex-shrink: 0; /* Prevents image from squishing */
        }

        .queue-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .queue-title {
            color: var(--text-main);
            font-weight: bold;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .queue-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Active styling overrides */
        .active-item {
            background-color: rgba(255, 193, 7, 0.1) !important;
            border-left: 3px solid var(--accent-gold);
            padding-left: 7px !important; /* Adjust padding to make room for border */
        }
        .active-item .queue-title {
            color: var(--accent-gold);
        }

        /* --- BOTTOM "NOW PLAYING" BAR --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background-color: var(--player-bg);
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .now-playing-info {
            display: flex;
            align-items: center;
            width: 30%;
        }

            width: 80px; 
            height: 80px; 
            border-radius: 6px;
            object-fit
