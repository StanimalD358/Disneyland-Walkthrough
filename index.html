<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Audio Player</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent-blue: #2979ff;
            --accent-gold: #ffc107;
            --player-bg: #181818;
            --volume-progress: 100%;
            --seek-progress: 0%;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- APP LAYOUT --- */
        .app-container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            padding-bottom: 120px; 
            width: 100vw;
        }

        .main-content { 
            flex: 1; /* Naturally grows to fill space */
            padding: 30px; 
            overflow-y: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- COLLAPSIBLE SIDEBAR --- */
        .sidebar { 
            width: 320px; 
            background-color: #000000; 
            padding: 20px; 
            overflow-y: auto; 
            border-left: 1px solid #282828;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: 0;
            padding: 0;
            border: none;
            opacity: 0;
            pointer-events: none;
        }

        h1 { margin-top: 0; font-size: 28px; width: 100%; text-align: left; }
        p.subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 20px; width: 100%; text-align: left; }
        h3.section-title { font-size: 18px; color: var(--text-main); border-bottom: 1px solid var(--bg-hover); padding-bottom: 10px; margin-top: 20px; width: 100%; }

        /* --- MAP STYLES --- */
        .map-outer-container { 
            position: relative; width: 100%; flex: 1; display: flex; flex-direction: column; 
            margin-top: 10px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.5); 
            border: 2px solid #333; overflow: hidden; background-color: #000; 
        }
        .map-wrapper { position: relative; width: 100%; flex: 1; height: 100%; overflow: auto; cursor: grab; scrollbar-width: none; }
        .map-wrapper::-webkit-scrollbar { display: none; }
        .map-wrapper:active { cursor: grabbing; }
        #map-zoom-container { position: relative; width: 100%; transition: width 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        #park-map-image { width: 100%; display: block; height: auto; user-select: none; -webkit-user-drag: none; }

        /* --- UI BUTTONS --- */
        .zoom-controls { position: absolute; bottom: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .sidebar-toggle-btn { 
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background-color: rgba(30, 30, 30, 0.9); color: var(--accent-gold);
            border: 1px solid #555; border-radius: 8px; padding: 10px 15px;
            font-size: 14px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        .sidebar-toggle-btn:hover { background: var(--accent-blue); color: white; }

        .zoom-btn { background-color: rgba(30, 30, 30, 0.8); color: white; border: 1px solid #555; border-radius: 50%; width: 44px; height: 44px; font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(5px); transition: background-color 0.2s; }
        .zoom-btn:hover { background-color: var(--accent-blue); }

        /* --- PINS & POPUPS --- */
        .map-pin { position: absolute; transform: translate(-50%, -50%); cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,0.8); transition: transform 0.2s; z-index: 10; }
        .ride-pin { width: 36px; height: 36px; background-color: var(--bg-card); border: 2px solid white; border-radius: 50%; animation: magicPulse 2.5s infinite; }
        @keyframes magicPulse { 0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); } }

        .custom-popup {
            position: absolute; background: var(--bg-card); border: 2px solid var(--accent-gold); border-radius: 8px;
            padding: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.8); z-index: 1000; min-width: 180px;
            transform: translate(-50%, calc(-100% - 25px)); 
        }
        .custom-popup::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -8px; border-width: 8px; border-style: solid; border-color: var(--accent-gold) transparent transparent transparent; }
        .custom-popup h4 { margin: 0 0 10px 0; font-size: 14px; text-align: center; border-bottom: 1px solid #444; padding-bottom: 8px; color: var(--text-main); }
        .custom-popup button { display: block; width: 100%; margin: 6px 0 0 0; padding: 10px; background: var(--bg-hover); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-align: left; transition: 0.2s; }
        .custom-popup button:hover { background: var(--accent-gold); color: black; }
        .close-popup { position: absolute; top: 5px; right: 8px; cursor: pointer; font-size: 14px; color: var(--text-muted); }

        /* --- QUEUE ITEMS --- */
        #itinerary-list { padding: 0; margin: 0; list-style: none; }
        #itinerary-list li { padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 12px; transition: background 0.2s; margin-bottom: 8px; }
        .queue-img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; }
        .queue-title { color: var(--text-main); font-weight: bold; font-size: 14px; display: block; }
        .queue-subtitle { font-size: 12px; color: var(--text-muted); display: block; }
        .active-item { background-color: rgba(255, 193, 7, 0.1) !important; border-left: 3px solid var(--accent-gold); }
        .start-btn { background-color: var(--accent-gold); color: #000; width: 100%; border: none; border-radius: 30px; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .start-btn:hover { transform: scale(1.02); }
        .clear-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); border-radius: 20px; padding: 6px 15px; font-size: 12px; cursor: pointer; margin-top: 15px; }

        /* --- PLAYER BAR --- */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 120px; background-color: var(--player-bg); border-top: 1px solid #282828; display: flex; align-items: center; padding: 0 30px; z-index: 1000; }
        .now-playing-info { display: flex; align-items: center; width: 30%; min-width: 320px; }
        #np-image { width: 80px; height: 80px; border-radius: 6px; object-fit: cover; margin-right: 20px; display: none; }
        .player-center { flex: 1; display: flex; flex-direction: column; align-items: center; max-width: 50%; }
        .player-controls { margin-bottom: 12px; display: flex; align-items: center; gap: 25px; }
        #play-pause-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--accent-blue); border: 2px solid #ffcc00; display: none; align-items: center; justify-content: center; cursor: pointer; }
        .icon-play, .icon-pause { width: 30px; height: 30px; fill: white; display: none; }
        #play-pause-btn.is-paused .icon-play { display: block; margin-left: 4px; }
        #play-pause-btn.is-playing .icon-pause { display: block; }

        /* --- PIXIE DUST SLIDERS --- */
        .progress-container { display: none; align-items: center; width: 100%; gap: 10px; }
        #progress-slider { 
            flex: 1; -webkit-appearance: none; background: transparent; height: 40px; cursor: pointer;
            --thumb-icon: url('data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'16\\' height=\\'16\\'><circle cx=\\'8\\' cy=\\'8\\' r=\\'8\\' fill=\\'%23ffc107\\'/></svg>');
        }
        #progress-slider::-webkit-slider-runnable-track { 
            width: 100%; height: 6px; 
            background: linear-gradient(to right, var(--accent-gold) 0%, var(--accent-gold) var(--seek-progress), #444 var(--seek-progress), #444 100%);
            border-radius: 3px; 
        }
        #progress-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 40px; width: 40px; background-image: var(--thumb-icon); 
            background-size: contain; background-repeat: no-repeat; background-position: center; margin-top: -17px;
            filter: drop-shadow(0 0 5px var(--accent-gold)); transition: 0.1s;
        }

        .player-right { width: 30%; display: flex; justify-content: flex-end; }
        .volume-container { display: none; align-items: center; gap: 10px; width: 150px; }
        #volume-slider { flex: 1; -webkit-appearance: none; background: transparent; cursor: pointer; }
        #volume-slider::-webkit-slider-runnable-track { 
            width: 100%; height: 4px; 
            background: linear-gradient(to right, var(--accent-gold) 0%, var(--accent-gold) var(--volume-progress), #444 var(--volume-progress), #444 100%);
            border-radius: 2px;
        }
        #volume-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: white; 
            border: 2px solid var(--accent-gold); margin-top: -8px; box-shadow: 0 0 10px var(--accent-gold);
        }

        .hidden-player { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="main-content" id="main-content">
            <h1>Disneyland Audio Map</h1>
            <p class="subtitle">Select your tracks on the map to build your journey.</p>
            
            <div class="map-outer-container">
                <button class="sidebar-toggle-btn" onclick="toggleSidebar()">☰ Toggle Queue</button>
                
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomMap(1)">+</button>
                    <button class="zoom-btn" onclick="zoomMap(-1)">−</button>
                </div>
                
                <div class="map-wrapper" id="map-wrapper">
                    <div id="map-zoom-container">
                        <img id="park-map-image" src="images/ParkMap.png" alt="Map">
                        <div id="map-pins-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <h3 class="section-title">Up Next</h3>
            <ul id="itinerary-list">
                <li style="color: #555;">Queue is empty. Click a pin to add.</li>
            </ul>
            <button class="clear-btn" onclick="clearItinerary()">Clear Queue</button>
            <button class="start-btn" onclick="startWalkthrough()">▶ Play Walkthrough</button>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing-info">
            <img id="np-image" src="">
            <div class="np-text">
                <div id="np-title">Ready</div>
                <div id="np-subtitle">Build your magic journey</div>
            </div>
        </div>
        <div class="player-center">
            <div class="player-controls">
                <button id="play-pause-btn" class="is-playing" onclick="togglePlayPause()">
                    <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="skip-btn" class="control-btn" onclick="skipStep()" style="display:none; background:none; border:none; cursor:pointer;">
                    <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
                </button>
            </div>
            <div class="progress-container" id="progress-container">
                <span id="time-current">0:00</span>
                <input type="range" id="progress-slider" min="0" value="0" step="1">
                <span id="time-total">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <div class="volume-container" id="volume-container">
                <span>🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
            </div>
        </div>
    </div>

    <audio id="player-1" class="hidden-player"></audio>
    <audio id="player-2" class="hidden-player"></audio>

    <script>
        const parkData = {
            mainStreet: {
                name: "Main Street, U.S.A.", image: "images/Main Street.png", icon: "images/Trolly.png", 
                ambientAudio: ["Audio/MS1.mp3"],
                rides: {
                    train: { name: "Disneyland Railroad", image: "images/Disneyland Railroad.png", mapX: 56.4, mapY: 89.9, audioTracks: [{title: "POV Journey", file: "Audio/Train.mp3"}] }
                }
            },
            adventureland: {
                name: "Adventureland", image: "images/Adventureland.png", icon: "images/IndyCar.png", 
                ambientAudio: ["Audio/Adventure1.mp3"],
                rides: {
                    indy: { name: "Indiana Jones", image: "images/Indiana Jones Adventure.png", mapX: 40.7, mapY: 69.7, audioTracks: [{title: "Full Ride Audio", file: "Audio/IndyRide.mp3"}] }
                }
            }
        };

        let itinerary = [], playbackQueue = [], nextItemId = 0, isWalkthroughActive = false, masterVolume = 1.0;
        let activePlayer = 1, fadeInterval, activePopup = null;
        
        const player1 = document.getElementById('player-1'), player2 = document.getElementById('player-2');
        const progressSlider = document.getElementById('progress-slider');
        const volumeSlider = document.getElementById('volume-slider');

        // --- SIDEBAR COLLAPSE LOGIC ---
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
        }

        // --- MAP RENDER ---
        function renderPins() {
            const container = document.getElementById('map-pins-container');
            for (let land in parkData) {
                for (let ride in parkData[land].rides) {
                    let r = parkData[land].rides[ride];
                    let div = document.createElement('div');
                    div.className = 'map-pin ride-pin';
                    div.style.left = r.mapX + '%'; div.style.top = r.mapY + '%';
                    div.style.backgroundImage = `url('${r.image}')`;
                    div.style.backgroundSize = 'cover';
                    div.setAttribute('data-name', r.name);
                    div.onclick = (e) => { e.stopPropagation(); openPopup(land, ride); };
                    container.appendChild(div);
                }
            }
        }
        renderPins();

        function openPopup(l, r) {
            if (activePopup) activePopup.remove();
            let ride = parkData[l].rides[r];
            let div = document.createElement('div');
            div.className = 'custom-popup';
            div.style.left = ride.mapX + '%'; div.style.top = ride.mapY + '%';
            let btns = ride.audioTracks.map((t, i) => `<button onclick="queueTrack('${l}','${r}',${i})">➕ ${t.title}</button>`).join('');
            div.innerHTML = `<span class="close-popup" onclick="this.parentElement.remove()">✕</span><h4>${ride.name}</h4>${btns}`;
            document.getElementById('map-zoom-container').appendChild(div);
            activePopup = div;
        }

        function queueTrack(l, r, idx) {
            if (activePopup) activePopup.remove();
            const list = document.getElementById('itinerary-list');
            if (itinerary.length === 0) list.innerHTML = '';
            let id = nextItemId++;
            itinerary.push({ land: l, ride: r, trackIdx: idx, id: id });
            let li = document.createElement('li');
            li.id = "item-" + id;
            li.innerHTML = `<img src="${parkData[l].rides[r].image}" class="queue-img"><div class="queue-info"><span class="queue-title">${parkData[l].rides[r].name}</span><span class="queue-subtitle">${parkData[l].name}</span></div>`;
            list.appendChild(li);
        }

        function startWalkthrough() {
            if (!itinerary.length) return;
            isWalkthroughActive = true;
            playbackQueue = [];
            itinerary.forEach(item => {
                let l = parkData[item.land];
                playbackQueue.push({ audio: l.ambientAudio[0], image: l.image, icon: l.icon, title: "Walking Through...", subtitle: l.name, target: "item-"+item.id });
                let r = l.rides[item.ride];
                playbackQueue.push({ audio: r.audioTracks[item.trackIdx].file, image: r.image, icon: l.icon, title: r.name, subtitle: l.name, target: "item-"+item.id });
            });
            document.getElementById('play-pause-btn').style.display = 'flex';
            document.getElementById('skip-btn').style.display = 'block';
            document.getElementById('progress-container').style.display = 'flex';
            document.getElementById('volume-container').style.display = 'flex';
            playNext();
        }

        function playNext() {
            clearInterval(fadeInterval);
            if (!playbackQueue.length) { 
                isWalkthroughActive = false; 
                fadeOutSingle(activePlayer === 1 ? player1 : player2);
                return; 
            }
            let step = playbackQueue.shift();
            document.querySelectorAll('li').forEach(l => l.classList.remove('active-item'));
            if(document.getElementById(step.target)) document.getElementById(step.target).classList.add('active-item');

            document.getElementById('np-title').textContent = step.title;
            document.getElementById('np-subtitle').textContent = step.subtitle;
            document.getElementById('np-image').src = step.image;
            document.getElementById('np-image').style.display = 'block';
            
            progressSlider.style.setProperty('--thumb-icon', `url('${step.icon}')`);

            let cur = activePlayer === 1 ? player1 : player2;
            let nxt = activePlayer === 1 ? player2 : player1;
            
            nxt.src = step.audio;
            nxt.volume = 0;
            nxt.play().then(() => {
                crossfade(cur, nxt);
                activePlayer = activePlayer === 1 ? 2 : 1;
            });
        }

        // --- PIXIE DUST UI UPDATES ---
        function updateUI() {
            const p = activePlayer === 1 ? player1 : player2;
            if (!p.duration) return;
            document.getElementById('time-current').textContent = formatTime(p.currentTime);
            document.getElementById('time-total').textContent = formatTime(p.duration);
            progressSlider.max = p.duration;
            progressSlider.value = p.currentTime;
            const percent = (p.currentTime / p.duration) * 100;
            document.documentElement.style.setProperty('--seek-progress', percent + '%');
        }

        player1.ontimeupdate = updateUI;
        player2.ontimeupdate = updateUI;

        progressSlider.oninput = (e) => {
            const p = activePlayer === 1 ? player1 : player2;
            p.currentTime = e.target.value;
        };

        volumeSlider.oninput = (e) => {
            masterVolume = e.target.value / 100;
            const p = activePlayer === 1 ? player1 : player2;
            p.volume = masterVolume;
            document.documentElement.style.setProperty('--volume-progress', e.target.value + '%');
        };

        function formatTime(s) {
            let m = Math.floor(s/60);
            let sec = Math.floor(s%60);
            return m + ":" + (sec < 10 ? "0" + sec : sec);
        }

        function crossfade(out, inv) {
            let p = 0;
            fadeInterval = setInterval(() => {
                p += 0.05;
                if (p >= 1) { clearInterval(fadeInterval); inv.volume = masterVolume; out.pause(); } 
                else { inv.volume = p * masterVolume; out.volume = (1 - p) * masterVolume; }
            }, 100);
        }

        function fadeOutSingle(p) {
            let vol = masterVolume;
            fadeInterval = setInterval(() => {
                vol -= 0.05;
                if (vol <= 0) { clearInterval(fadeInterval); p.pause(); p.src = ""; }
                else { p.volume = vol; }
            }, 100);
        }

        function togglePlayPause() {
            const p = activePlayer === 1 ? player1 : player2;
            const btn = document.getElementById('play-pause-btn');
            if (p.paused) { p.play(); btn.classList.replace('is-paused', 'is-playing'); }
            else { p.pause(); btn.classList.replace('is-playing', 'is-paused'); }
        }

        function skipStep() { playNext(); }
        player1.onended = playNext;
        player2.onended = playNext;

        // --- ZOOM LOGIC ---
        let zoom = 100;
        function zoomMap(d) {
            zoom = Math.min(400, Math.max(100, zoom + (d * 50)));
            document.getElementById('map-zoom-container').style.width = zoom + '%';
        }
    </script>
</body>
</html>
