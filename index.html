<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Audio Player</title>
    <style>
        /* --- GLOBAL DARK THEME --- */
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --bg-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #a7a7a7;
            --accent-blue: #2979ff;
            --accent-gold: #ffc107;
            --player-bg: #181818;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MAIN APP LAYOUT --- */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding-bottom: 90px; /* Space for the bottom player */
        }

        .main-content {
            flex: 3;
            padding: 30px;
            overflow-y: auto;
        }

        .sidebar {
            flex: 1;
            min-width: 300px;
            background-color: #000000;
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid #282828;
        }

        h1 { margin-top: 0; font-size: 28px; }
        p.subtitle { color: var(--text-muted); margin-top: -10px; margin-bottom: 30px; }

        h3.section-title {
            font-size: 18px;
            color: var(--text-main);
            border-bottom: 1px solid var(--bg-hover);
            padding-bottom: 10px;
            margin-top: 20px;
        }

        /* --- TILE GRID (ALBUM COVERS) --- */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tile {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            text-align: center;
        }

        .tile:hover {
            background-color: var(--bg-hover);
            transform: translateY(-4px);
        }

        .tile.selected {
            background-color: var(--bg-hover);
            box-shadow: 0 0 0 2px var(--accent-blue);
        }

        .tile img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .tile-label {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- BUTTONS --- */
        .action-btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-bottom: 20px;
        }
        .action-btn:hover { background-color: #1c63d6; transform: scale(1.05); }

        .start-btn {
            background-color: var(--accent-gold);
            color: #000;
            width: 100%;
            border: none;
            border-radius: 30px;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .start-btn:hover { transform: scale(1.02); background-color: #e5ad06; }

        .clear-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
            border-radius: 20px;
            padding: 6px 15px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 15px;
            transition: color 0.2s, border-color 0.2s;
        }
        .clear-btn:hover { color: #ff4d4d; border-color: #ff4d4d; }

        /* --- QUEUE LIST --- */
        #itinerary-list {
            padding: 0;
            margin: 0;
            list-style: none;
        }
        #itinerary-list li {
            padding: 12px 10px;
            border-radius: 4px;
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }
        #itinerary-list li:hover { background-color: var(--bg-hover); color: var(--text-main); }
        
        .active-item {
            color: var(--accent-gold) !important;
            font-weight: bold;
            background-color: rgba(255, 193, 7, 0.1) !important;
            border-left: 3px solid var(--accent-gold);
        }

        /* --- BOTTOM "NOW PLAYING" BAR --- */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            background-color: var(--player-bg);
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .now-playing-info {
            display: flex;
            align-items: center;
            width: 30%;
        }

        #np-image {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
            margin-right: 15px;
            display: none; /* Hidden until playing */
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .np-text {
            display: flex;
            flex-direction: column;
        }

        #np-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        #np-subtitle {
            font-size: 12px;
            color: var(--text-muted);
        }

        .player-controls {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
        }
        .control-btn:hover { color: var(--text-main); transform: scale(1.1); }
        
        #skip-btn { display: none; } /* Hidden until playing */

        .hidden-player { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="main-content">
            <h1>Disneyland Audio Player</h1>
            <p class="subtitle">Curate your perfect park walkthrough.</p>

            <h3 class="section-title">1. Select a Land</h3>
            <div id="lands-grid" class="tile-grid"></div>

            <div id="rides-section" style="display: none;">
                <h3 class="section-title">2. Select a Ride (Optional)</h3>
                <div id="rides-grid" class="tile-grid"></div>
            </div>

            <button class="action-btn" onclick="addToItinerary()">+ Add to Queue</button>
        </div>

        <div class="sidebar">
            <h3 class="section-title" style="margin-top: 0;">Up Next</h3>
            <ul id="itinerary-list">
                <li style="color: #555;">Your queue is empty.</li>
            </ul>
            <button class="clear-btn" onclick="clearItinerary()">Clear Queue</button>
            <button class="start-btn" onclick="startWalkthrough()">▶ Play Walkthrough</button>
        </div>
    </div>

    <div class="player-bar">
        <div class="now-playing-info">
            <img id="np-image" src="" alt="Album Art">
            <div class="np-text">
                <div id="np-title">Ready to Play</div>
                <div id="np-subtitle">Build your queue above</div>
            </div>
        </div>
        
        <div class="player-controls">
            <button id="skip-btn" class="control-btn" onclick="skipStep()" title="Skip to Next">⏭️</button>
        </div>
    </div>

    <audio id="player-1" class="hidden-player"></audio>
    <audio id="player-2" class="hidden-player"></audio>

    <script>
        const parkData = {
            mainStreet: {
                name: "Main Street, U.S.A.",
                image: "images/main_street.jpg",
                ambientAudio: ["audio/main_street_bgm1.mp3", "audio/main_street_bgm2.mp3"],
                rides: {
                    train: { name: "Disneyland Railroad", image: "images/train.jpg", audio: "audio/train_ride.mp3" },
                    cinema: { name: "Main Street Cinema", image: "images/cinema.jpg", audio: "audio/cinema_bgm.mp3" }
                }
            },
            adventureland: {
                name: "Adventureland",
                image: "images/adventureland.jpg",
                ambientAudio: ["audio/adventure_bgm1.mp3", "audio/adventure_bgm2.mp3"],
                rides: {
                    indy: { name: "Indiana Jones Adventure", image: "images/indy.jpg", audio: "audio/indy_theme.mp3" },
                    jungle: { name: "Jungle Cruise", image: "images/jungle.jpg", audio: "audio/jungle_cruise_spiel.mp3" }
                }
            },
            fantasyland: {
                name: "Fantasyland",
                image: "images/fantasyland.jpg",
                ambientAudio: ["audio/fantasy_bgm1.mp3"],
                rides: {
                    peterPan: { name: "Peter Pan's Flight", image: "images/peter_pan.jpg", audio: "audio/peter_pan.mp3" },
                    smallWorld: { name: "It's a Small World", image: "images/small_world.jpg", audio: "audio/small_world.mp3" }
                }
            },
            tomorrowland: {
                name: "Tomorrowland",
                image: "images/tomorrowland.jpg",
                ambientAudio: ["audio/tomorrow_bgm1.mp3"],
                rides: {
                    spaceMountain: { name: "Space Mountain", image: "images/space.jpg", audio: "audio/space_mountain.mp3" },
                    starTours: { name: "Star Tours", image: "images/star_tours.jpg", audio: "audio/star_tours.mp3" }
                }
            }
        };

        const landsGrid = document.getElementById('lands-grid');
        const ridesSection = document.getElementById('rides-section');
        const ridesGrid = document.getElementById('rides-grid');
        const itineraryList = document.getElementById('itinerary-list');
        
        // Player Bar UI Elements
        const npTitle = document.getElementById('np-title');
        const npSubtitle = document.getElementById('np-subtitle');
        const npImage = document.getElementById('np-image');
        const skipBtn = document.getElementById('skip-btn');

        let currentSelectedLand = "";
        let currentSelectedRide = "";
        let itinerary = []; 
        let playbackQueue = []; 

        const player1 = document.getElementById('player-1');
        const player2 = document.getElementById('player-2');
        let activePlayer = 1; 
        let fadeInterval;

        function renderLands() {
            landsGrid.innerHTML = "";
            for (const landKey in parkData) {
                const land = parkData[landKey];
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `land-tile-${landKey}`;
                tile.onclick = () => selectLand(landKey);
                
                tile.innerHTML = `
                    <img src="${land.image}" alt="${land.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%23333\\'/></svg>'">
                    <p class="tile-label">${land.name}</p>
                `;
                landsGrid.appendChild(tile);
            }
        }

        function selectLand(landKey) {
            currentSelectedLand = landKey;
            currentSelectedRide = ""; 
            document.querySelectorAll('#lands-grid .tile').forEach(t => t.classList.remove('selected'));
            document.getElementById(`land-tile-${landKey}`).classList.add('selected');
            renderRides(landKey);
        }

        function renderRides(landKey) {
            ridesGrid.innerHTML = "";
            ridesSection.style.display = "block"; 
            const rides = parkData[landKey].rides;
            
            for (const rideKey in rides) {
                const ride = rides[rideKey];
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `ride-tile-${rideKey}`;
                tile.onclick = () => selectRide(rideKey);
                
                tile.innerHTML = `
                    <img src="${ride.image}" alt="${ride.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100\\' height=\\'100\\'><rect width=\\'100\\' height=\\'100\\' fill=\\'%23333\\'/></svg>'">
                    <p class="tile-label">${ride.name}</p>
                `;
                ridesGrid.appendChild(tile);
            }
        }

        function selectRide(rideKey) {
            if (currentSelectedRide === rideKey) {
                currentSelectedRide = "";
                document.getElementById(`ride-tile-${rideKey}`).classList.remove('selected');
                return;
            }
            currentSelectedRide = rideKey;
            document.querySelectorAll('#rides-grid .tile').forEach(t => t.classList.remove('selected'));
            document.getElementById(`ride-tile-${rideKey}`).classList.add('selected');
        }

        renderLands();

        function addToItinerary() {
            if (!currentSelectedLand) {
                alert("Please select a land first!");
                return;
            }

            if (itinerary.length === 0) {
                itineraryList.innerHTML = ''; // Clear empty message
            }

            const landData = parkData[currentSelectedLand];
            let titleText = currentSelectedRide ? landData.rides[currentSelectedRide].name : landData.name;
            let subtitleText = currentSelectedRide ? landData.name : "Atmosphere";

            const itemIndex = itinerary.length;
            itinerary.push({ land: currentSelectedLand, ride: currentSelectedRide, index: itemIndex });

            const li = document.createElement('li');
            // Format queue text
            li.innerHTML = `<strong>${titleText}</strong> &nbsp; <span style="font-size: 12px; color: #777;">(${subtitleText})</span>`;
            li.id = "itinerary-item-" + itemIndex; 
            itineraryList.appendChild(li);

            currentSelectedLand = "";
            currentSelectedRide = "";
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            ridesSection.style.display = "none";
        }

        function clearItinerary() {
            itinerary = [];
            playbackQueue = [];
            itineraryList.innerHTML = '<li style="color: #555;">Your queue is empty.</li>';
            
            npTitle.textContent = 'Ready to Play';
            npSubtitle.textContent = 'Build your queue above';
            npImage.style.display = 'none';
            npImage.src = '';
            
            player1.pause();
            player2.pause();
            player1.src = '';
            player2.src = '';
            
            skipBtn.style.display = 'none';
        }

        function startWalkthrough() {
            if (itinerary.length === 0) {
                alert("Your queue is empty! Add some stops first.");
                return;
            }

            playbackQueue = []; 

            itinerary.forEach(item => {
                const landData = parkData[item.land];
                const randomAmbient = landData.ambientAudio[Math.floor(Math.random() * landData.ambientAudio.length)];
                
                playbackQueue.push({
                    audio: randomAmbient,
                    image: landData.image,
                    title: `Walking through ${landData.name}`,
                    subtitle: "Atmosphere",
                    targetId: "itinerary-item-" + item.index
                });

                if (item.ride) {
                    const rideData = landData.rides[item.ride];
                    playbackQueue.push({
                        audio: rideData.audio,
                        image: rideData.image,
                        title: rideData.name,
                        subtitle: landData.name,
                        targetId: "itinerary-item-" + item.index
                    });
                }
            });

            const lastItem = itinerary[itinerary.length - 1];
            const lastLandData = parkData[lastItem.land];
            const finalAmbient = lastLandData.ambientAudio[Math.floor(Math.random() * lastLandData.ambientAudio.length)];
            
            playbackQueue.push({
                audio: finalAmbient,
                image: lastLandData.image,
                title: `Exiting into ${lastLandData.name}`,
                subtitle: "Atmosphere",
                targetId: "itinerary-item-" + lastItem.index
            });

            skipBtn.style.display = 'inline-block';
            playNextInQueue();
        }

        function skipStep() { playNextInQueue(); }

        function playNextInQueue() {
            const allItems = document.querySelectorAll('#itinerary-list li');
            allItems.forEach(li => li.classList.remove('active-item'));

            let currentPlayer = activePlayer === 1 ? player1 : player2;
            let nextPlayer = activePlayer === 1 ? player2 : player1;

            if (playbackQueue.length === 0) {
                npTitle.textContent = "Walkthrough Complete";
                npSubtitle.textContent = "Hope you had a magical day!";
                npImage.style.display = "none";
                skipBtn.style.display = 'none';
                fadeOutSingle(currentPlayer);
                return;
            }

            const currentStep = playbackQueue.shift(); 

            if (currentStep.targetId) {
                const activeListItem = document.getElementById(currentStep.targetId);
                if (activeListItem) activeListItem.classList.add('active-item');
            }

            // Update Player UI Bar
            npTitle.textContent = currentStep.title;
            npSubtitle.textContent = currentStep.subtitle;
            
            if (currentStep.image) {
                npImage.src = currentStep.image;
                npImage.style.display = 'block';
            } else {
                npImage.style.display = 'none';
            }

            nextPlayer.src = currentStep.audio;
            nextPlayer.volume = 0; 
            
            nextPlayer.play().then(() => {
                if (!currentPlayer.paused && currentPlayer.src) {
                    crossfade(currentPlayer, nextPlayer);
                } else {
                    fadeInSingle(nextPlayer);
                }
                activePlayer = activePlayer === 1 ? 2 : 1;
            }).catch(e => {
                console.log("Audio not found: " + currentStep.audio);
            });
        }

        function crossfade(fadeOutPlayer, fadeInPlayer) {
            clearInterval(fadeInterval);
            let volume = 0;
            fadeInterval = setInterval(() => {
                volume += 0.05; 
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    fadeInPlayer.volume = 1;
                    fadeOutPlayer.volume = 0;
                    fadeOutPlayer.pause(); 
                } else {
                    fadeInPlayer.volume = volume;
                    fadeOutPlayer.volume = 1 - volume;
                }
            }, 100); 
        }

        function fadeInSingle(player) {
            clearInterval(fadeInterval);
            let volume = 0;
            player.volume = 0;
            fadeInterval = setInterval(() => {
                volume += 0.05;
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    player.volume = 1;
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        function fadeOutSingle(player) {
            clearInterval(fadeInterval);
            let volume = player.volume;
            fadeInterval = setInterval(() => {
                volume -= 0.05;
                if (volume <= 0) {
                    clearInterval(fadeInterval);
                    player.volume = 0;
                    player.pause();
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        player1.onended = function() { playNextInQueue(); };
        player2.onended = function() { playNextInQueue(); };

    </script>
</body>
</html>
