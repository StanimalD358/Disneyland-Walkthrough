<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disneyland Walkthrough Builder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            text-align: center;
            padding: 30px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        /* --- NEW TILE GRID STYLES --- */
        .section-title {
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 15px;
            color: #444;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
            text-align: left;
        }
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .tile {
            position: relative;
            height: 120px;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            background-color: #ddd; /* Fallback color if image is missing */
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: all 0.3s ease;
        }
        .tile:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .tile:hover img {
            opacity: 0.9;
        }
        .tile.selected {
            border-color: #0066cc;
            box-shadow: 0 0 15px rgba(0, 102, 204, 0.4);
            transform: scale(1.03);
        }
        .tile.selected img {
            opacity: 1;
        }
        .tile-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 8px 5px;
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }

        /* --- BUTTONS & ITINERARY STYLES --- */
        .action-btn {
            background-color: #0066cc;
            color: white;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .action-btn:hover { background-color: #004c99; }
        
        .start-btn {
            background-color: #28a745;
            width: 100%;
            font-size: 20px;
            padding: 18px;
            margin-top: 30px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .start-btn:hover { background-color: #218838; }
        
        .clear-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            padding: 8px 15px;
            cursor: pointer;
            margin-top: 10px;
        }
        .clear-btn:hover { background-color: #c82333; }

        #skip-btn {
            background-color: #ff9800; 
            display: none; 
            margin-top: 15px;
            width: 100%;
            font-size: 16px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        #skip-btn:hover { background-color: #e68a00; }

        #itinerary-container {
            text-align: left;
            background: #fdfdfd;
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }
        #itinerary-list {
            padding-left: 0;
            margin-top: 10px;
        }
        #itinerary-list li {
            list-style-type: none;
            padding: 12px;
            margin-bottom: 8px;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            border-left: 5px solid transparent;
            transition: all 0.3s ease;
            font-size: 16px;
        }
        .active-item {
            background-color: #fff3cd !important;
            font-weight: bold;
            border-left: 5px solid #ffc107 !important;
            transform: scale(1.02);
        }
        
        #story-box {
            margin-top: 30px;
            padding: 20px;
            background-color: #e9ecef;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            line-height: 1.5;
            min-height: 60px;
        }
        #display-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .hidden-player {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Disneyland Walkthrough Builder</h1>
        <p>Tap a land, optionally tap a ride, and add it to your itinerary!</p>

        <h3 class="section-title">1. Choose a Land</h3>
        <div id="lands-grid" class="tile-grid">
            </div>

        <div id="rides-section" style="display: none;">
            <h3 class="section-title">2. Choose a Ride (Optional)</h3>
            <div id="rides-grid" class="tile-grid">
                </div>
        </div>

        <button class="action-btn" onclick="addToItinerary()">➕ Add to Itinerary</button>
        <div id="itinerary-container">
            <h3 style="margin-top: 0;">Your Plan:</h3>
            <ul id="itinerary-list"></ul>
            <button class="clear-btn" onclick="clearItinerary()">🗑️ Clear Itinerary</button>
        </div>

        <button class="start-btn" onclick="startWalkthrough()">▶ Start My Walkthrough</button>

        <div id="story-box">Build your itinerary above!</div>
        <img id="display-image" src="" alt="Park Location">
        
        <button id="skip-btn" onclick="skipStep()">⏭️ Skip to Next</button>

        <audio id="player-1" class="hidden-player"></audio>
        <audio id="player-2" class="hidden-player"></audio>
    </div>

    <script>
        const parkData = {
            mainStreet: {
                name: "Main Street, U.S.A.",
                image: "images/main_street.jpg",
                ambientAudio: ["audio/main_street_bgm1.mp3", "audio/main_street_bgm2.mp3"],
                rides: {
                    train: { name: "Disneyland Railroad", image: "images/train.jpg", audio: "audio/train_ride.mp3" },
                    cinema: { name: "Main Street Cinema", image: "images/cinema.jpg", audio: "audio/cinema_bgm.mp3" }
                }
            },
            adventureland: {
                name: "Adventureland",
                image: "images/adventureland.jpg",
                ambientAudio: ["audio/adventure_bgm1.mp3", "audio/adventure_bgm2.mp3"],
                rides: {
                    indy: { name: "Indiana Jones Adventure", image: "images/indy.jpg", audio: "audio/indy_theme.mp3" },
                    jungle: { name: "Jungle Cruise", image: "images/jungle.jpg", audio: "audio/jungle_cruise_spiel.mp3" }
                }
            },
            fantasyland: {
                name: "Fantasyland",
                image: "images/fantasyland.jpg",
                ambientAudio: ["audio/fantasy_bgm1.mp3"],
                rides: {
                    peterPan: { name: "Peter Pan's Flight", image: "images/peter_pan.jpg", audio: "audio/peter_pan.mp3" },
                    smallWorld: { name: "It's a Small World", image: "images/small_world.jpg", audio: "audio/small_world.mp3" }
                }
            },
            tomorrowland: {
                name: "Tomorrowland",
                image: "images/tomorrowland.jpg",
                ambientAudio: ["audio/tomorrow_bgm1.mp3"],
                rides: {
                    spaceMountain: { name: "Space Mountain", image: "images/space.jpg", audio: "audio/space_mountain.mp3" },
                    starTours: { name: "Star Tours", image: "images/star_tours.jpg", audio: "audio/star_tours.mp3" }
                }
            }
        };

        // UI Elements
        const landsGrid = document.getElementById('lands-grid');
        const ridesSection = document.getElementById('rides-section');
        const ridesGrid = document.getElementById('rides-grid');
        const itineraryList = document.getElementById('itinerary-list');
        const storyBox = document.getElementById('story-box');
        const displayImage = document.getElementById('display-image');
        const skipBtn = document.getElementById('skip-btn');

        // State Variables to track what the user clicked
        let currentSelectedLand = "";
        let currentSelectedRide = "";
        
        let itinerary = []; 
        let playbackQueue = []; 

        // Audio Elements
        const player1 = document.getElementById('player-1');
        const player2 = document.getElementById('player-2');
        let activePlayer = 1; 
        let fadeInterval;

        // --- NEW: RENDER THE LAND TILES ON PAGE LOAD ---
        function renderLands() {
            landsGrid.innerHTML = "";
            for (const landKey in parkData) {
                const land = parkData[landKey];
                
                // Create the tile HTML
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `land-tile-${landKey}`;
                tile.onclick = () => selectLand(landKey);
                
                // Include an onerror fallback just in case the image hasn't been uploaded yet
                tile.innerHTML = `
                    <img src="${land.image}" alt="${land.name}" onerror="this.style.display='none'">
                    <p class="tile-label">${land.name}</p>
                `;
                
                landsGrid.appendChild(tile);
            }
        }

        // --- NEW: HANDLE CLICKING A LAND ---
        function selectLand(landKey) {
            currentSelectedLand = landKey;
            currentSelectedRide = ""; // Reset ride choice when changing lands

            // Highlight the selected land tile
            document.querySelectorAll('#lands-grid .tile').forEach(t => t.classList.remove('selected'));
            document.getElementById(`land-tile-${landKey}`).classList.add('selected');

            // Show and render the rides for this land
            renderRides(landKey);
        }

        // --- NEW: RENDER THE RIDE TILES ---
        function renderRides(landKey) {
            ridesGrid.innerHTML = "";
            ridesSection.style.display = "block"; // Unhide the rides section
            
            const rides = parkData[landKey].rides;
            
            for (const rideKey in rides) {
                const ride = rides[rideKey];
                
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `ride-tile-${rideKey}`;
                tile.onclick = () => selectRide(rideKey);
                
                tile.innerHTML = `
                    <img src="${ride.image}" alt="${ride.name}" onerror="this.style.display='none'">
                    <p class="tile-label">${ride.name}</p>
                `;
                
                ridesGrid.appendChild(tile);
            }
        }

        // --- NEW: HANDLE CLICKING A RIDE ---
        function selectRide(rideKey) {
            // Allow deselecting a ride if clicked twice
            if (currentSelectedRide === rideKey) {
                currentSelectedRide = "";
                document.getElementById(`ride-tile-${rideKey}`).classList.remove('selected');
                return;
            }

            currentSelectedRide = rideKey;

            // Highlight the selected ride tile
            document.querySelectorAll('#rides-grid .tile').forEach(t => t.classList.remove('selected'));
            document.getElementById(`ride-tile-${rideKey}`).classList.add('selected');
        }

        // Initialize the page by drawing the land tiles
        renderLands();

        // --- UPDATED: ADD TO ITINERARY USING THE TILES ---
        function addToItinerary() {
            if (!currentSelectedLand) {
                alert("Please tap a land first!");
                return;
            }

            const landData = parkData[currentSelectedLand];
            let displayText = landData.name;
            if (currentSelectedRide) {
                displayText += " ➔ " + landData.rides[currentSelectedRide].name;
            }

            const itemIndex = itinerary.length;
            itinerary.push({ land: currentSelectedLand, ride: currentSelectedRide, index: itemIndex });

            const li = document.createElement('li');
            li.textContent = displayText;
            li.id = "itinerary-item-" + itemIndex; 
            itineraryList.appendChild(li);

            // Reset the visual selection
            currentSelectedLand = "";
            currentSelectedRide = "";
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            ridesSection.style.display = "none";
        }

        function clearItinerary() {
            itinerary = [];
            playbackQueue = [];
            itineraryList.innerHTML = '';
            storyBox.innerHTML = 'Build your itinerary above!';
            displayImage.style.display = 'none';
            
            player1.pause();
            player2.pause();
            player1.src = '';
            player2.src = '';
            
            skipBtn.style.display = 'none';
        }

        function startWalkthrough() {
            if (itinerary.length === 0) {
                alert("Your itinerary is empty! Add some stops first.");
                return;
            }

            playbackQueue = []; 

            itinerary.forEach(item => {
                const landData = parkData[item.land];
                const randomAmbient = landData.ambientAudio[Math.floor(Math.random() * landData.ambientAudio.length)];
                
                playbackQueue.push({
                    audio: randomAmbient,
                    image: landData.image,
                    text: `Walking through ${landData.name}...`,
                    targetId: "itinerary-item-" + item.index
                });

                if (item.ride) {
                    const rideData = landData.rides[item.ride];
                    playbackQueue.push({
                        audio: rideData.audio,
                        image: rideData.image,
                        text: `Riding ${rideData.name}!`,
                        targetId: "itinerary-item-" + item.index
                    });
                }
            });

            const lastItem = itinerary[itinerary.length - 1];
            const lastLandData = parkData[lastItem.land];
            const finalAmbient = lastLandData.ambientAudio[Math.floor(Math.random() * lastLandData.ambientAudio.length)];
            
            playbackQueue.push({
                audio: finalAmbient,
                image: lastLandData.image,
                text: `Exiting back into ${lastLandData.name}...`,
                targetId: "itinerary-item-" + lastItem.index
            });

            skipBtn.style.display = 'block';
            playNextInQueue();
        }

        function skipStep() {
            playNextInQueue();
        }

        // Audio System Logic (Unchanged)
        function playNextInQueue() {
            const allItems = document.querySelectorAll('#itinerary-list li');
            allItems.forEach(li => li.classList.remove('active-item'));

            let currentPlayer = activePlayer === 1 ? player1 : player2;
            let nextPlayer = activePlayer === 1 ? player2 : player1;

            if (playbackQueue.length === 0) {
                storyBox.innerHTML = "Your magical day has come to an end!";
                displayImage.style.display = "none";
                skipBtn.style.display = 'none';
                fadeOutSingle(currentPlayer);
                return;
            }

            const currentStep = playbackQueue.shift(); 

            if (currentStep.targetId) {
                const activeListItem = document.getElementById(currentStep.targetId);
                if (activeListItem) activeListItem.classList.add('active-item');
            }

            storyBox.innerHTML = currentStep.text;
            if (currentStep.image) {
                displayImage.src = currentStep.image;
                displayImage.style.display = 'block';
            } else {
                displayImage.style.display = 'none';
            }

            nextPlayer.src = currentStep.audio;
            nextPlayer.volume = 0; 
            
            nextPlayer.play().then(() => {
                if (!currentPlayer.paused && currentPlayer.src) {
                    crossfade(currentPlayer, nextPlayer);
                } else {
                    fadeInSingle(nextPlayer);
                }
                activePlayer = activePlayer === 1 ? 2 : 1;
            }).catch(e => {
                console.log("Audio not found: " + currentStep.audio);
            });
        }

        function crossfade(fadeOutPlayer, fadeInPlayer) {
            clearInterval(fadeInterval);
            let volume = 0;
            fadeInterval = setInterval(() => {
                volume += 0.05; 
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    fadeInPlayer.volume = 1;
                    fadeOutPlayer.volume = 0;
                    fadeOutPlayer.pause(); 
                } else {
                    fadeInPlayer.volume = volume;
                    fadeOutPlayer.volume = 1 - volume;
                }
            }, 100); 
        }

        function fadeInSingle(player) {
            clearInterval(fadeInterval);
            let volume = 0;
            player.volume = 0;
            fadeInterval = setInterval(() => {
                volume += 0.05;
                if (volume >= 1) {
                    clearInterval(fadeInterval);
                    player.volume = 1;
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        function fadeOutSingle(player) {
            clearInterval(fadeInterval);
            let volume = player.volume;
            fadeInterval = setInterval(() => {
                volume -= 0.05;
                if (volume <= 0) {
                    clearInterval(fadeInterval);
                    player.volume = 0;
                    player.pause();
                } else {
                    player.volume = volume;
                }
            }, 100);
        }

        player1.onended = function() { playNextInQueue(); };
        player2.onended = function() { playNextInQueue(); };

    </script>
</body>
</html>
